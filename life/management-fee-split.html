<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="description" content="룸메이트나 가족끼리 관리비를 인원수와 사용량 기준으로 공평하게 나눠보세요.">

<meta property="og:url" content="https://www.everyday-tab.com/life/management-fee-split.html">
<meta property="og:site_name" content="Everyday Tab">
<meta property="og:title" content="관리비 분담 계산기 | Everyday Tab">
<meta property="og:description" content="룸메이트나 가족끼리 관리비를 인원수와 사용량 기준으로 공평하게 나눠보세요.">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="관리비 분담 계산기 | Everyday Tab">
<meta name="twitter:description" content="룸메이트나 가족끼리 관리비를 인원수와 사용량 기준으로 공평하게 나눠보세요.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9; --danger:#E2704F;
    --radius-lg:22px; --radius-md:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%), var(--bg);
    color:var(--rice);font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;line-height:1.55;padding-bottom:60px;}
  h1,h2{font-family:"Noto Serif KR",serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;}
  button,input{font-family:inherit;}
  ::selection{background:var(--yolk);color:#1D231E;}
  :focus-visible{outline:2px solid var(--yolk);outline-offset:2px;}
  .wrap{max-width:560px;margin:0 auto;padding:0 20px;}

  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(29,35,30,0.86);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:560px;margin:0 auto;padding:12px 20px;}
  .back-link{font-size:13px;font-weight:700;color:var(--rice-dim);}
  .back-link:hover{color:var(--yolk);}

  .hero{padding:30px 0 10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--negi);text-transform:uppercase;}
  .hero h1{font-size:clamp(26px,7vw,36px);font-weight:900;}
  .hero p{max-width:42ch;color:var(--rice-dim);font-size:14.5px;margin:0;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;margin-top:22px;display:flex;flex-direction:column;gap:16px;}
  label{display:flex;flex-direction:column;gap:6px;font-size:13.5px;font-weight:700;color:var(--rice-dim);}
  input[type="number"], input[type="text"]{
    height:46px;border-radius:var(--radius-md);border:1px solid var(--line);background:var(--surface-2);
    color:var(--rice);padding:0 14px;font-size:15px;font-weight:700;outline:none;width:100%;
  }

  .people-group{display:flex;gap:6px;}
  .people-btn{flex:1;height:42px;border-radius:999px;border:1px solid var(--line);background:var(--surface-2);
    color:var(--rice-dim);font-size:13px;font-weight:800;cursor:pointer;}
  .people-btn.active{background:var(--yolk);color:#241a00;border-color:var(--yolk);}

  .person-rows{display:flex;flex-direction:column;gap:8px;}
  .person-row{display:flex;align-items:center;gap:8px;}
  .person-row .name{width:56px;font-size:13px;font-weight:700;color:var(--rice-dim);flex:none;}
  .person-row input{height:42px;}

  .result{padding:20px;border-radius:var(--radius-lg);border:1px solid var(--line);background:var(--surface-2);}
  .placeholder{color:var(--rice-dim);font-size:13.5px;text-align:center;display:block;padding:16px 0;}
  .result-list{display:flex;flex-direction:column;gap:8px;}
  .result-row{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius-md);padding:12px 16px;}
  .result-row .name{font-size:13.5px;font-weight:700;color:var(--rice);}
  .result-row .amt{font-size:16px;font-weight:900;color:var(--yolk);}
  .result-total{margin-top:6px;display:flex;justify-content:space-between;padding:10px 16px;font-size:13px;color:var(--rice-dim);}

  .note{margin-top:20px;background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius-lg);padding:16px 18px;font-size:13.5px;color:var(--rice-dim);}
  .note b{color:var(--rice);}

  .related{margin-top:26px;}
  .related h2{font-size:16px;font-weight:700;margin-bottom:10px;}
  .related-row{display:flex;gap:10px;}
  .related-card{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:13px;font-weight:700;text-align:center;}
  .related-card:hover{border-color:rgba(243,184,6,.35);}
  .related-card .ic{font-size:20px;display:block;margin-bottom:4px;}

  footer{padding:30px 0 4px;text-align:center;color:var(--rice-dim);font-size:12.5px;}
</style>
</head>
<body>

<div class="topbar"><div class="topbar-inner"><a class="back-link" href="../index.html">← everyday-tab</a></div></div>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Shared Bill Splitter</div>
    <h1>🧮 관리비 분담 계산기</h1>
    <p>인터넷·관리비 같은 균등 항목과, 전기료처럼 쓴 만큼 나누는 항목을 함께 계산해요.</p>
  </section>

  <div class="card">
    <label>인원 수
      <div class="people-group" id="peopleGroup">
        <button type="button" class="people-btn" data-n="2">2명</button>
        <button type="button" class="people-btn active" data-n="3">3명</button>
        <button type="button" class="people-btn" data-n="4">4명</button>
        <button type="button" class="people-btn" data-n="5">5명</button>
        <button type="button" class="people-btn" data-n="6">6명</button>
      </div>
    </label>

    <label>균등 분배 항목 총액 (관리비 기본료, 인터넷 등, 원)
      <input type="number" id="equalInput" inputmode="numeric" placeholder="90000">
    </label>

    <label>사용량 비례 항목 총액 (전기료 등, 원)
      <input type="number" id="usageTotalInput" inputmode="numeric" placeholder="120000">
    </label>

    <label>인원별 사용량 (숫자 비율로 입력, 예: 전력량 kWh)
      <div class="person-rows" id="personRows"></div>
    </label>

    <div class="result" id="resultBox">
      <span class="placeholder">항목을 입력해주세요</span>
    </div>
  </div>

  <div class="note">
    <b>Tip.</b> 사용량을 다 모르면 "1"씩 똑같이 입력하면 균등분배와 동일하게 계산돼요. 전기료 고지서에 나온 각자 방의 계량기 사용량(kWh)을 입력하면 실제 사용한 만큼 공평하게 나눌 수 있어요.
  </div>

  <div class="related">
    <h2>🔗 이런 것도 찾아보세요</h2>
    <div class="related-row">
      <a class="related-card" href="jeonse-deposit.html"><span class="ic">🏠</span>전세보증금 계산기</a>
      <a class="related-card" href="moving-cost.html"><span class="ic">📦</span>이사비용 계산기</a>
    </div>
  </div>

  <footer>everyday-tab · 생활 도구</footer>
</div>

<script>
(function(){
  "use strict";

  const peopleGroup = document.getElementById("peopleGroup");
  const equalInput = document.getElementById("equalInput");
  const usageTotalInput = document.getElementById("usageTotalInput");
  const personRows = document.getElementById("personRows");
  const resultBox = document.getElementById("resultBox");

  let peopleCount = 3;

  function formatWon(n){
    return Math.round(n).toLocaleString("ko-KR") + "원";
  }

  function renderPersonRows(){
    const prevValues = Array.from(personRows.querySelectorAll("input")).map(i => i.value);
    personRows.innerHTML = "";
    for (let i = 0; i < peopleCount; i++){
      const row = document.createElement("div");
      row.className = "person-row";
      row.innerHTML =
        '<span class="name">' + (i + 1) + '번</span>' +
        '<input type="number" inputmode="numeric" class="usage-input" placeholder="1" value="' + (prevValues[i] || "") + '">';
      personRows.appendChild(row);
    }
    personRows.querySelectorAll(".usage-input").forEach(el => el.addEventListener("input", render));
  }

  function render(){
    const equalTotal = parseFloat(equalInput.value) || 0;
    const usageTotal = parseFloat(usageTotalInput.value) || 0;
    const usageInputs = Array.from(personRows.querySelectorAll(".usage-input")).map(el => parseFloat(el.value) || 0);
    const usageSum = usageInputs.reduce((a, b) => a + b, 0);

    if (equalTotal <= 0 && usageTotal <= 0){
      resultBox.innerHTML = '<span class="placeholder">항목을 입력해주세요</span>';
      return;
    }

    const equalShare = equalTotal / peopleCount;

    let rows = "";
    let totalCheck = 0;
    for (let i = 0; i < peopleCount; i++){
      const usageShare = usageSum > 0 ? (usageTotal * (usageInputs[i] / usageSum)) : (usageTotal / peopleCount);
      const personTotal = equalShare + usageShare;
      totalCheck += personTotal;
      rows += '<div class="result-row"><span class="name">' + (i + 1) + '번</span><span class="amt">' + formatWon(personTotal) + '</span></div>';
    }

    resultBox.innerHTML =
      '<div class="result-list">' + rows + '</div>' +
      '<div class="result-total"><span>합계</span><span>' + formatWon(totalCheck) + '</span></div>';
  }

  peopleGroup.addEventListener("click", (e) => {
    const btn = e.target.closest(".people-btn");
    if (!btn) return;
    peopleCount = parseInt(btn.dataset.n, 10);
    peopleGroup.querySelectorAll(".people-btn").forEach(b => b.classList.toggle("active", b === btn));
    renderPersonRows();
    render();
  });

  equalInput.addEventListener("input", render);
  usageTotalInput.addEventListener("input", render);

  renderPersonRows();
})();
</script>
</body>
</html>

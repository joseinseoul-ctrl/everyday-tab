<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>이사비용 계산기 · 생활 도구</title>

<meta property="og:type" content="website">
<meta property="og:url" content="https://www.everyday-tab.com/life/moving-cost.html">
<meta property="og:site_name" content="Everyday Tab">
<meta property="og:title" content="이사비용 계산기 | Everyday Tab">
<meta property="og:description" content="평형, 이사 방식, 이동 거리로 예상 이사비용 범위를 계산합니다.">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="이사비용 계산기 | Everyday Tab">
<meta name="twitter:description" content="평형, 이사 방식, 이동 거리로 예상 이사비용 범위를 계산합니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9; --danger:#E2704F;
    --radius-lg:22px; --radius-md:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%), var(--bg);
    color:var(--rice);font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;line-height:1.55;padding-bottom:60px;}
  h1,h2{font-family:"Noto Serif KR",serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;}
  button,input{font-family:inherit;}
  ::selection{background:var(--yolk);color:#1D231E;}
  :focus-visible{outline:2px solid var(--yolk);outline-offset:2px;}
  .wrap{max-width:520px;margin:0 auto;padding:0 20px;}

  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(29,35,30,0.86);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:520px;margin:0 auto;padding:12px 20px;}
  .back-link{font-size:13px;font-weight:700;color:var(--rice-dim);}
  .back-link:hover{color:var(--yolk);}

  .hero{padding:30px 0 10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--negi);text-transform:uppercase;}
  .hero h1{font-size:clamp(26px,7vw,36px);font-weight:900;}
  .hero p{max-width:40ch;color:var(--rice-dim);font-size:14.5px;margin:0;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;margin-top:22px;display:flex;flex-direction:column;gap:16px;}
  label{display:flex;flex-direction:column;gap:6px;font-size:13.5px;font-weight:700;color:var(--rice-dim);}

  .btn-group{display:flex;gap:6px;flex-wrap:wrap;}
  .opt-btn{flex:1;min-width:80px;height:44px;border-radius:999px;border:1px solid var(--line);background:var(--surface-2);
    color:var(--rice-dim);font-size:13px;font-weight:800;cursor:pointer;}
  .opt-btn.active{background:var(--yolk);color:#241a00;border-color:var(--yolk);}

  .check-row{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;color:var(--rice);cursor:pointer;}
  .check-row input{width:20px;height:20px;accent-color:var(--negi);cursor:pointer;}

  .result{padding:26px 10px;border-radius:var(--radius-lg);border:1px solid var(--line);background:var(--surface-2);
    display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
  .placeholder{color:var(--rice-dim);font-size:13.5px;}
  .result .num{font-size:28px;font-weight:900;color:var(--yolk);}
  .result .sub{font-size:12.5px;color:var(--rice-dim);}

  .note{margin-top:20px;background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius-lg);padding:16px 18px;font-size:13.5px;color:var(--rice-dim);}
  .note b{color:var(--rice);}

  .related{margin-top:26px;}
  .related h2{font-size:16px;font-weight:700;margin-bottom:10px;}
  .related-row{display:flex;gap:10px;}
  .related-card{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:13px;font-weight:700;text-align:center;}
  .related-card:hover{border-color:rgba(243,184,6,.35);}
  .related-card .ic{font-size:20px;display:block;margin-bottom:4px;}

  footer{padding:30px 0 4px;text-align:center;color:var(--rice-dim);font-size:12.5px;}
</style>
</head>
<body>

<div class="topbar"><div class="topbar-inner"><a class="back-link" href="../index.html">← everyday-tab</a></div></div>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Moving Cost Estimator</div>
    <h1>📦 이사비용 계산기</h1>
    <p>평형과 이사 방식, 이동 거리를 선택하면 예상 이사비용 범위를 알려드려요.</p>
  </section>

  <div class="card">
    <label>평형
      <div class="btn-group" id="sizeGroup">
        <button type="button" class="opt-btn active" data-size="studio">원룸 (~10평)</button>
        <button type="button" class="opt-btn" data-size="two">투룸 (~20평)</button>
        <button type="button" class="opt-btn" data-size="three">쓰리룸 이상 (30평+)</button>
      </div>
    </label>

    <label>이사 방식
      <div class="btn-group" id="methodGroup">
        <button type="button" class="opt-btn" data-method="general">일반이사</button>
        <button type="button" class="opt-btn active" data-method="semi">반포장이사</button>
        <button type="button" class="opt-btn" data-method="packed">포장이사</button>
      </div>
    </label>

    <label>이동 거리
      <div class="btn-group" id="distanceGroup">
        <button type="button" class="opt-btn active" data-distance="same">동일 시/구 내</button>
        <button type="button" class="opt-btn" data-distance="far">타 시/도</button>
      </div>
    </label>

    <label class="check-row"><input type="checkbox" id="ladderCheck"> 사다리차 필요 (고층/엘리베이터 없음 등)</label>
    <label class="check-row"><input type="checkbox" id="seasonCheck"> 이사 성수기 (3~4월, 9~11월, 손 없는 날 등)</label>

    <div class="result" id="resultBox"></div>
  </div>

  <div class="note">
    <b>Tip.</b> 실제 견적은 짐의 양, 사다리차/엘리베이터 유무, 지역, 업체별 시세에 따라 차이가 커요. 이 계산기는 대략적인 시세 범위를 보여주는 참고용이니, 정확한 비용은 이사업체 2~3곳에서 견적을 받아 비교해보시는 걸 추천해요.
  </div>

  <div class="related">
    <h2>🔗 이런 것도 찾아보세요</h2>
    <div class="related-row">
      <a class="related-card" href="jeonse-deposit.html"><span class="ic">🏠</span>전세보증금 계산기</a>
      <a class="related-card" href="management-fee-split.html"><span class="ic">🧮</span>관리비 분담 계산기</a>
    </div>
  </div>

  <footer>everyday-tab · 생활 도구</footer>
</div>

<script>
(function(){
  "use strict";

  const BASE = {
    studio: { general: [200000, 350000], semi: [300000, 450000], packed: [400000, 600000] },
    two:    { general: [350000, 550000], semi: [500000, 750000], packed: [700000, 1000000] },
    three:  { general: [550000, 900000], semi: [850000, 1300000], packed: [1200000, 1800000] },
  };

  let size = "studio";
  let method = "semi";
  let distance = "same";

  const sizeGroup = document.getElementById("sizeGroup");
  const methodGroup = document.getElementById("methodGroup");
  const distanceGroup = document.getElementById("distanceGroup");
  const ladderCheck = document.getElementById("ladderCheck");
  const seasonCheck = document.getElementById("seasonCheck");
  const resultBox = document.getElementById("resultBox");

  function formatWon(n){
    return Math.round(n).toLocaleString("ko-KR") + "원";
  }

  function render(){
    let [min, max] = BASE[size][method];

    if (distance === "far"){ min *= 1.15; max *= 1.15; }
    if (seasonCheck.checked){ min *= 1.2; max *= 1.2; }
    if (ladderCheck.checked){ min += 100000; max += 150000; }

    resultBox.innerHTML =
      '<div class="num">' + formatWon(min) + ' ~ ' + formatWon(max) + '</div>' +
      '<div class="sub">선택하신 조건 기준 예상 비용 범위예요</div>';
  }

  function bindGroup(group, setter){
    group.addEventListener("click", (e) => {
      const btn = e.target.closest(".opt-btn");
      if (!btn) return;
      group.querySelectorAll(".opt-btn").forEach(b => b.classList.toggle("active", b === btn));
      setter(btn);
      render();
    });
  }

  bindGroup(sizeGroup, (btn) => { size = btn.dataset.size; });
  bindGroup(methodGroup, (btn) => { method = btn.dataset.method; });
  bindGroup(distanceGroup, (btn) => { distance = btn.dataset.distance; });
  ladderCheck.addEventListener("change", render);
  seasonCheck.addEventListener("change", render);

  render();
})();
</script>
</body>
</html>

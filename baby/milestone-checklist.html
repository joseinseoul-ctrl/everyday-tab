    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);

  :focus-visible{outline:2px solid var(--yolk);outline-offset:2px;}

  .hero{padding:30px 0 10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--negi);text-transform:uppercase;}
  .hero h1{font-size:clamp(24px,6.5vw,34px);font-weight:900;}
  .hero p{max-width:42ch;color:var(--rice-dim);font-size:14.5px;margin:0;}

  .warn-banner{margin-top:14px;background:rgba(243,184,6,0.08);border:1px solid rgba(243,184,6,0.3);border-radius:var(--radius-md);
    padding:12px 16px;font-size:12.5px;color:var(--rice-dim);text-align:center;}
  .warn-banner b{color:var(--yolk);}

  .age-select{margin-top:16px;width:100%;height:48px;border-radius:var(--radius-md);border:1px solid var(--line);
    background:var(--surface);color:var(--rice);padding:0 14px;font-size:15px;font-weight:700;outline:none;}

  .progress-text{margin-top:14px;font-size:13px;color:var(--rice-dim);text-align:center;}
  .progress-text b{color:var(--yolk);}

  .category{margin-top:16px;}
  .category h3{font-size:14px;font-weight:800;color:var(--rice);margin-bottom:8px;}
  .item-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--line);}
  .item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface);border-bottom:1px solid var(--line);font-size:13.5px;cursor:pointer;}
  .item:last-child{border-bottom:none;}
  .item input{width:20px;height:20px;accent-color:var(--negi);cursor:pointer;flex:none;}
  .item.checked span{color:var(--rice-dim);text-decoration:line-through;text-decoration-color:var(--negi);}

  .note{margin-top:20px;background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius-lg);padding:16px 18px;font-size:13px;color:var(--rice-dim);}
  .note b{color:var(--rice);}

  .related{margin-top:26px;}
  .related h2{font-size:16px;font-weight:700;margin-bottom:10px;}
  .related-row{display:flex;gap:10px;flex-wrap:wrap;}
  .related-card{flex:1;min-width:130px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:13px;font-weight:700;text-align:center;}

  .related-card .ic{font-size:20px;display:block;margin-bottom:4px;}

  footer{padding:30px 0 4px;text-align:center;color:var(--rice-dim);font-size:12.5px;}

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Developmental Milestones</div>
    <h1>✅ 월령별 발달단계 체크리스트</h1>
    <p>이 월령대에 흔히 볼 수 있는 발달 모습들을 참고용 체크리스트로 확인해보세요.</p>
  </section>

  <div class="warn-banner"><b>참고용입니다.</b> 발달 속도는 아기마다 차이가 매우 커요. 이 체크리스트는 진단 도구가 아니며, 여러 항목이 계속 해당하지 않는다면 정기 영유아 검진이나 소아과 상담을 받아보시는 걸 권해요.</div>

  <select class="age-select" id="ageSelect">
    <option value="0">0~3개월</option>
    <option value="1">4~6개월</option>
    <option value="2">7~9개월</option>
    <option value="3">10~12개월</option>
    <option value="4">13~18개월</option>
    <option value="5">19~24개월</option>
  </select>

  <div class="progress-text" id="progressText"></div>
  <div id="checklistContainer"></div>

  <div class="related">
    <h2>🔗 이런 것도 찾아보세요</h2>
    <div class="related-row">
      <a class="related-card" href="growth-percentile.html"><span class="ic">📊</span>성장 백분위 계산기</a>
      <a class="related-card" href="sleep-guide.html"><span class="ic">😴</span>월령별 수면시간 가이드</a>
    </div>
  </div>

  <footer>everyday-tab · 육아 도구</footer>
</div>

<script>
(function(){
  "use strict";

  var STAGES = [
    { label: "0~3개월", categories: {
      "대근육": ["엎드린 자세에서 잠깐씩 고개를 든다", "팔다리를 활발하게 움직인다"],
      "소근육・감각": ["손을 얼굴 가까이 가져와 쳐다본다", "밝은 빛이나 큰 소리에 반응한다"],
      "사회성・언어": ["사람 얼굴을 물끄러미 바라본다", "옹알이 비슷한 소리를 낸다", "웃는 얼굴을 보면 따라 웃기 시작한다(사회적 미소)"],
    }},
    { label: "4~6개월", categories: {
      "대근육": ["엎드린 자세에서 가슴까지 들어올린다", "뒤집기를 시도하거나 성공한다", "도움을 받으면 앉은 자세를 잠깐 유지한다"],
      "소근육・감각": ["손을 뻗어 장난감을 잡으려 한다", "물건을 손바닥 전체로 움켜쥔다"],
      "사회성・언어": ["까르르 소리 내어 웃는다", "다양한 옹알이 소리를 낸다", "낯가림이 시작되기도 한다"],
    }},
    { label: "7~9개월", categories: {
      "대근육": ["혼자 앉을 수 있다", "배밀이나 기어다니기를 시도한다", "잡고 서려고 한다"],
      "소근육・감각": ["엄지와 검지로 작은 물건을 집으려 한다", "양손에 물건을 하나씩 쥔다"],
      "사회성・언어": ["이름을 부르면 쳐다본다", "\"엄마\", \"아빠\" 비슷한 소리를 낸다", "까꿍 놀이에 반응하며 좋아한다"],
    }},
    { label: "10~12개월", categories: {
      "대근육": ["가구를 잡고 옆으로 걷는다(캐루징)", "손을 잡아주면 몇 걸음 걷는다", "혼자 서는 것을 시도한다"],
      "소근육・감각": ["엄지와 검지로 작은 물건을 정확히 집는다(집게 잡기)", "컵이나 숟가락에 관심을 보인다"],
      "사회성・언어": ["\"안돼\" 같은 간단한 말을 이해한다", "손을 흔들며 인사하는 흉내를 낸다", "의미 있는 첫 단어를 말하기도 한다"],
    }},
    { label: "13~18개월", categories: {
      "대근육": ["혼자 걷는다", "계단을 기어오르려 한다", "쪼그려 앉았다 일어난다"],
      "소근육・감각": ["숟가락을 사용해 스스로 먹으려 한다", "블록 2~3개를 쌓는다"],
      "사회성・언어": ["간단한 단어 몇 개를 말한다", "간단한 지시를 따른다(공 줘 등)", "그림책의 그림을 손가락으로 가리킨다"],
    }},
    { label: "19~24개월", categories: {
      "대근육": ["뛰어다닌다", "공을 발로 찬다", "계단을 한 발씩 오르내린다(손 잡고)"],
      "소근육・감각": ["블록 4개 이상을 쌓는다", "크레파스로 끄적이며 낙서한다"],
      "사회성・언어": ["두 단어를 붙여 말한다(\"엄마 물\" 등)", "간단한 신체 부위를 가리킬 수 있다", "다른 아이 옆에서 함께 노는 것에 관심을 보인다"],
    }},
  ];

  var ageSelect = document.getElementById("ageSelect");
  var progressText = document.getElementById("progressText");
  var container = document.getElementById("checklistContainer");

  var checkedMapByStage = {}; // stageIndex -> Set-like object of checked item text

  function render(){
    var idx = parseInt(ageSelect.value, 10);
    var stage = STAGES[idx];
    if (!checkedMapByStage[idx]) checkedMapByStage[idx] = {};
    var checkedMap = checkedMapByStage[idx];

    container.innerHTML = "";
    var total = 0, done = 0;

    Object.keys(stage.categories).forEach(function(catName){
      var items = stage.categories[catName];
      var catDiv = document.createElement("div");
      catDiv.className = "category";
      var list = document.createElement("ul");
      list.className = "item-list";

      items.forEach(function(itemText){
        total++;
        var isChecked = Boolean(checkedMap[itemText]);
        if (isChecked) done++;
        var li = document.createElement("li");
        li.className = "item" + (isChecked ? " checked" : "");
        li.innerHTML = '<input type="checkbox" ' + (isChecked ? "checked" : "") + '><span>' + itemText + '</span>';
        li.addEventListener("click", function(){
          checkedMap[itemText] = !checkedMap[itemText];
          render();
        });
        list.appendChild(li);
      });

      catDiv.innerHTML = '<h3>' + catName + '</h3>';
      catDiv.appendChild(list);
      container.appendChild(catDiv);
    });

    progressText.innerHTML = stage.label + ' — 체크 <b>' + done + ' / ' + total + '</b>';
  }

  ageSelect.addEventListener("change", render);
  render();
})();
</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="../popularity.js"></script>

<script src="../share.js" defer></script>
</body>
</html>

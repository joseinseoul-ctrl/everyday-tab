<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Baby Days Calculator</div>
    <h1>👶 생후일수 계산기</h1>
    <p>태어난 날짜만 입력하면 오늘까지 생후 며칠째인지, 백일과 첫돌까지 며칠 남았는지 바로 알려드려요.</p>
  </section>

  <div class="card">
    <label>
      태어난 날짜
      <input type="date" id="birthInput">
    </label>

    <div class="result" id="resultBox">
      <span class="placeholder">태어난 날짜를 선택해주세요</span>
    </div>

    <div class="milestones" id="milestones" style="display:none;"></div>
  </div>

  <div class="note">
    <b>Tip.</b> "생후 1일"은 태어난 날 당일을 1일째로 세는 방식이에요(한국식 육아 관례 기준). 백일·첫돌은 만 나이가 아니라 태어난 날 기준으로 정확히 100일째, 365일째를 계산합니다.

</div>

<script>
(function(){
  "use strict";

  const birthInput = document.getElementById("birthInput");
  const resultBox = document.getElementById("resultBox");
  const milestonesEl = document.getElementById("milestones");

  function todayMidnight(){
    const d = new Date();
    d.setHours(0,0,0,0);
    return d;
  }

  function addDays(date, days){
    const d = new Date(date);
    d.setDate(d.getDate() + days);
    return d;
  }

  function formatDate(d){
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}.${m}.${day}`;
  }

  function formatDday(targetDate, today){
    const diff = Math.round((targetDate - today) / 86400000);
    if (diff === 0) return { text: "D-Day", isToday: true };
    if (diff > 0) return { text: "D-" + diff, isToday: false };
    return { text: "지남", isToday: false };
  }

  function render(){
    const val = birthInput.value;
    if (!val){
      resultBox.innerHTML = '<span class="placeholder">태어난 날짜를 선택해주세요</span>';
      milestonesEl.style.display = "none";
      return;
    }

    const birth = new Date(val + "T00:00:00");
    const today = todayMidnight();
    const days = Math.floor((today - birth) / 86400000) + 1;

    if (days < 1){
      resultBox.innerHTML = '<span class="placeholder">아직 태어나기 전 날짜예요. 날짜를 다시 확인해주세요.</span>';
      milestonesEl.style.display = "none";
      return;
    }

    const weeks = Math.floor(days / 7);
    const months = Math.floor(days / 30.44);

    resultBox.innerHTML =
      '<div class="big">' + days + '일째</div>' +
      '<div class="sub">약 ' + weeks + '주 · ' + months + '개월</div>';

    const milestoneDefs = [
      { label: "50일", offset: 49 },
      { label: "100일(백일)", offset: 99 },
      { label: "200일", offset: 199 },
      { label: "첫돌(365일)", offset: 364 },
    ];

    milestonesEl.innerHTML = "";
    milestoneDefs.forEach(m => {
      const target = addDays(birth, m.offset);
      const dday = formatDday(target, today);
      const el = document.createElement("div");
      el.className = "milestone";
      el.innerHTML =
        '<div class="label">' + m.label + '</div>' +
        '<div class="value' + (dday.isToday ? ' today' : '') + '">' + dday.text + '</div>' +
        '<div class="date">' + formatDate(target) + '</div>';
      milestonesEl.appendChild(el);
    });
    milestonesEl.style.display = "grid";
  }

  birthInput.addEventListener("change", render);
})();
</script>

<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9;
    --radius-lg:22px; --radius-md:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%), var(--bg);
    color:var(--rice);font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;line-height:1.55;padding-bottom:60px;}
  h1,h2{font-family:"Noto Serif KR",serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;}
  button,input{font-family:inherit;}
  ::selection{background:var(--yolk);color:#1D231E;}
  :focus-visible{outline:2px solid var(--yolk);outline-offset:2px;}
  .wrap{max-width:560px;margin:0 auto;padding:0 20px;}

  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(29,35,30,0.86);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:560px;margin:0 auto;padding:12px 20px;}
  .back-link{font-size:13px;font-weight:700;color:var(--rice-dim);}
  .back-link:hover{color:var(--yolk);}

  .hero{padding:30px 0 10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--negi);text-transform:uppercase;}
  .hero h1{font-size:clamp(24px,6.5vw,34px);font-weight:900;}
  .hero p{max-width:42ch;color:var(--rice-dim);font-size:14.5px;margin:0;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;margin-top:22px;display:flex;flex-direction:column;gap:16px;}
  label{display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:700;color:var(--rice-dim);}
  input[type="number"]{
    height:48px;border-radius:var(--radius-md);border:1px solid var(--line);background:var(--surface-2);
    color:var(--rice);padding:0 14px;font-size:16px;font-weight:700;outline:none;width:100%;
  }

  .result{padding:22px;border-radius:var(--radius-lg);border:1px solid var(--line);background:var(--surface-2);}
  .placeholder{color:var(--rice-dim);font-size:13.5px;text-align:center;display:block;padding:16px 0;}
  .stage-badge{text-align:center;font-size:20px;font-weight:900;color:var(--yolk);}
  .stage-sub{text-align:center;margin-top:4px;font-size:12.5px;color:var(--rice-dim);}
  .info-grid{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .info-item{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:12px;text-align:center;}
  .info-item .lb{font-size:11px;color:var(--rice-dim);}
  .info-item .v{margin-top:4px;font-size:14.5px;font-weight:800;color:var(--rice);}
  .food-list{margin-top:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:13px;color:var(--rice-dim);}
  .food-list b{color:var(--rice);}

  .timeline{margin-top:16px;display:flex;flex-direction:column;gap:6px;}
  .timeline-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-md);font-size:12.5px;}
  .timeline-row.current{background:rgba(243,184,6,0.1);border:1px solid rgba(243,184,6,0.3);}
  .timeline-row .age{flex:none;width:70px;color:var(--rice-dim);font-weight:700;}
  .timeline-row .name{color:var(--rice);}
  .timeline-row.current .name{color:var(--yolk);font-weight:800;}

  .note{margin-top:20px;background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius-lg);padding:16px 18px;font-size:13px;color:var(--rice-dim);}
  .note b{color:var(--rice);}

  .related{margin-top:26px;}
  .related h2{font-size:16px;font-weight:700;margin-bottom:10px;}
  .related-row{display:flex;gap:10px;flex-wrap:wrap;}
  .related-card{flex:1;min-width:130px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:13px;font-weight:700;text-align:center;}
  .related-card:hover{border-color:rgba(243,184,6,.35);}
  .related-card .ic{font-size:20px;display:block;margin-bottom:4px;}

  footer{padding:30px 0 4px;text-align:center;color:var(--rice-dim);font-size:12.5px;}
</style>
</head>
<body>

<div class="topbar"><div class="topbar-inner"><a class="back-link" href="../index.html">← everyday-tab</a></div></div>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Weaning Stage Guide</div>
    <h1>🥄 이유식 단계 계산기</h1>
    <p>개월수를 입력하면 지금이 이유식 어느 단계인지, 하루 몇 번・어떤 농도로 줘야 하는지 참고 가이드를 보여드려요.</p>
  </section>

  <div class="card">
    <label>아기 개월수
      <input type="number" id="ageInput" inputmode="numeric" placeholder="7" min="0" max="30">
    </label>

    <div class="result" id="resultBox">
      <span class="placeholder">개월수를 입력해주세요</span>
    </div>
  </div>

  <div class="note">
    <b>참고 가이드입니다.</b> 이유식 시작・진행 속도는 아기 발달 상태(목 가누기, 음식에 대한 관심 등)에 따라 개인차가 커요. 알레르기 이력이 있거나 조산아인 경우, 반드시 소아과와 상담 후 진행해주세요.
  </div>

  <div class="related">
    <h2>🔗 이런 것도 찾아보세요</h2>
    <div class="related-row">
      <a class="related-card" href="milk-amount.html"><span class="ic">🍼</span>분유량 계산기</a>
      <a class="related-card" href="milestone-checklist.html"><span class="ic">✅</span>월령별 발달단계</a>
    </div>
  </div>

  <footer>everyday-tab · 육아 도구</footer>
</div>

<script>
(function(){
  "use strict";

  var STAGES = [
    { min: 0, max: 3.9, name: "이유식 전", sub: "모유・분유만으로 충분한 시기", texture: "-", freq: "-", foods: "아직 이유식을 시작하지 않아도 괜찮은 시기예요. 4개월 이후 발달 신호(목 가누기, 음식에 관심 보이기)를 지켜봐주세요." },
    { min: 4, max: 5.9, name: "시작 준비기", sub: "발달 신호를 보며 시작을 고려하는 시기", texture: "묽은 미음", freq: "하루 1회, 한두 숟갈부터", foods: "쌀미음으로 시작해 하루 한두 숟갈씩, 알레르기 반응을 3일 정도 지켜보며 천천히 늘려가요." },
    { min: 6, max: 8.9, name: "초기 이유식", sub: "곱게 간 묽은 미음 단계", texture: "체에 곱게 거른 미음", freq: "하루 1~2회", foods: "쌀・채소 미음 위주로 시작해 한 가지씩 새 재료를 추가해요. 소고기・두부 등 철분원도 이 시기부터 조금씩 시도해요." },
    { min: 9, max: 11.9, name: "중기 이유식", sub: "알갱이가 살짝 남은 진밥 단계", texture: "쌀알이 살짝 씹히는 진밥・죽", freq: "하루 2~3회", foods: "혀로 으깰 수 있는 정도의 무른 진밥으로 넘어가요. 다양한 채소・육류・과일을 골고루 접하게 해줘요." },
    { min: 12, max: 14.9, name: "후기 이유식", sub: "잘게 다진 진밥 단계", texture: "잘게 다진 재료가 섞인 진밥", freq: "하루 3회 + 간식 1~2회", foods: "잇몸으로 씹을 수 있는 정도의 굵기로 다져줘요. 가족 식사와 비슷한 식재료를 활용하기 시작해요." },
    { min: 15, max: 24, name: "완료기 (유아식 전환)", sub: "일반식에 가까운 무른 진밥・진밥", texture: "일반 진밥에 가까운 질감", freq: "하루 3회 + 간식 2회", foods: "성인 식사와 비슷하게 조리하되, 간은 약하게 하고 질식 위험 있는 딱딱한 음식(땅콩 통알, 방울토마토 통째 등)은 피해주세요." },
  ];

  var ageInput = document.getElementById("ageInput");
  var resultBox = document.getElementById("resultBox");

  function render(){
    var age = parseFloat(ageInput.value);

    if (!(age >= 0)){
      resultBox.innerHTML = '<span class="placeholder">개월수를 입력해주세요</span>';
      return;
    }

    var current = STAGES.find(function(s){ return age >= s.min && age <= s.max; }) || STAGES[STAGES.length - 1];

    var timeline = STAGES.map(function(s){
      var isCurrent = s === current;
      return '<div class="timeline-row' + (isCurrent ? " current" : "") + '">' +
        '<span class="age">' + s.min + (s.max >= 24 ? "개월~" : "~" + s.max.toFixed(0) + "개월") + '</span>' +
        '<span class="name">' + s.name + '</span>' +
      '</div>';
    }).join("");

    resultBox.innerHTML =
      '<div class="stage-badge">' + current.name + '</div>' +
      '<div class="stage-sub">' + current.sub + '</div>' +
      '<div class="info-grid">' +
        '<div class="info-item"><div class="lb">농도・질감</div><div class="v">' + current.texture + '</div></div>' +
        '<div class="info-item"><div class="lb">하루 횟수</div><div class="v">' + current.freq + '</div></div>' +
      '</div>' +
      '<div class="food-list"><b>이 시기 가이드.</b> ' + current.foods + '</div>' +
      '<div class="timeline">' + timeline + '</div>';
  }

  ageInput.addEventListener("input", render);
})();
</script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="../popularity.js"></script>
<script src="../structured-data.js" defer></script>
<script src="../share.js" defer></script>
</body>
</html>

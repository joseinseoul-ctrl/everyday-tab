<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>즐겨찾기 · everyday-tab</title>
<meta name="robots" content="noindex, follow">
<meta name="description" content="내가 저장한 즐겨찾기 도구 모음입니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9; --danger:#E2704F;
    --radius-lg:22px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%), var(--bg);
    color:var(--rice);font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;line-height:1.55;padding-bottom:60px;}
  h1{font-family:"Noto Serif KR",serif;margin:0;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px;}
  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(29,35,30,0.86);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:1040px;margin:0 auto;padding:14px 20px;}
  .back-link{font-size:13px;font-weight:700;color:var(--rice-dim);}
  .back-link:hover{color:var(--yolk);}
  .head{padding:26px 0 16px;}
  .head h1{font-size:24px;font-weight:800;}
  .head p{margin:6px 0 0;font-size:13.5px;color:var(--rice-dim);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:14px;padding:10px 0 30px;}
  .card-wrap{position:relative;}
  .fav-btn{position:absolute;top:14px;left:14px;z-index:2;width:28px;height:28px;border-radius:50%;
    border:1px solid var(--line);background:rgba(38,45,38,0.85);color:var(--danger);font-size:13px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;}
  .card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);
    padding:20px 18px 18px;display:flex;flex-direction:column;gap:10px;min-height:150px;cursor:pointer;overflow:hidden;}
  .card:hover{border-color:rgba(243,184,6,0.35);background:var(--surface-2);}
  .card.soon{filter:grayscale(.5);}
  .ribbon{position:absolute;top:14px;right:-30px;background:var(--surface-2);color:var(--rice-dim);
    font-size:10.5px;font-weight:800;padding:4px 34px;transform:rotate(28deg);border:1px solid var(--line);}
  .card-icon{font-size:26px;}
  .card-title{font-size:16px;font-weight:700;}
  .card-desc{font-size:13px;color:var(--rice-dim);flex:1;margin:0;}
  .card-foot{font-size:12.5px;font-weight:700;color:var(--yolk);}
  .empty{padding:70px 0;text-align:center;color:var(--rice-dim);font-size:14px;}
</style>
</head>
<body>

<div class="topbar"><div class="topbar-inner"><a class="back-link" href="index.html">← everyday-tab</a></div></div>

<div class="wrap">
  <div class="head">
    <h1>♥ 즐겨찾기</h1>
    <p>이 브라우저에 저장된 즐겨찾기예요. 도구 카드의 하트를 누르면 여기 추가/제거됩니다.</p>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">아직 즐겨찾기한 도구가 없어요.</div>
</div>

<script src="data.js"></script>
<script src="favorites.js"></script>
<script src="cards.js"></script>
<script>
(function(){
  const favs = getFavorites();
  const items = favs.map(slug => ITEMS.find(i => i.slug === slug)).filter(Boolean);
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");

  if (!items.length) {
    empty.style.display = "block";
  } else {
    items.forEach(item => grid.appendChild(createCardElement(item)));
  }
})();
</script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="popularity.js"></script>
<script src="share.js" defer></script>
</body>
</html>

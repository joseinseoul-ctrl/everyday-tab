<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9; --danger:#E2704F;
    --radius-lg:22px; --radius-md:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%), var(--bg);
    color:var(--rice);font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;line-height:1.55;padding-bottom:60px;
    -webkit-tap-highlight-color:transparent;}
  h1,h2{font-family:"Noto Serif KR",serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;}
  button{font-family:inherit;}
  ::selection{background:var(--yolk);color:#1D231E;}
  :focus-visible{outline:2px solid var(--yolk);outline-offset:2px;}
  .wrap{max-width:420px;margin:0 auto;padding:0 20px;}

  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(29,35,30,0.86);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:420px;margin:0 auto;padding:12px 20px;}
  .back-link{font-size:13px;font-weight:700;color:var(--rice-dim);}
  .back-link:hover{color:var(--yolk);}

  .hero{padding:24px 0 6px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--negi);text-transform:uppercase;}
  .hero h1{font-size:clamp(26px,7vw,34px);font-weight:900;}

  .score-row{display:flex;gap:10px;justify-content:center;margin-top:10px;}
  .score-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:8px 18px;text-align:center;}
  .score-box .lb{font-size:10.5px;color:var(--rice-dim);}
  .score-box .num{font-size:18px;font-weight:900;color:var(--yolk);}

  .board-wrap{position:relative;margin-top:16px;}
  .board{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:var(--surface-2);
    border-radius:var(--radius-lg);padding:8px;aspect-ratio:1/1;user-select:none;
  }
  .cell{background:rgba(245,241,232,0.05);border-radius:var(--radius-md);}
  .tile{
    position:absolute;display:flex;align-items:center;justify-content:center;
    border-radius:var(--radius-md);font-weight:900;transition:top .12s ease, left .12s ease, transform .1s ease;
  }

  .overlay{
    position:absolute;inset:0;border-radius:var(--radius-lg);background:rgba(29,35,30,0.9);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;
  }
  .overlay.show{display:flex;}
  .overlay .msg{font-size:22px;font-weight:900;color:var(--rice);}
  .overlay button{border:none;background:var(--yolk);color:#241a00;font-weight:800;padding:10px 22px;border-radius:999px;cursor:pointer;}

  .btn-row{display:flex;justify-content:center;margin-top:16px;}
  .btn{border:none;border-radius:999px;padding:10px 20px;font-size:13.5px;font-weight:800;cursor:pointer;background:var(--surface-2);color:var(--rice-dim);border:1px solid var(--line);}
  .btn:hover{color:var(--yolk);}

  .note{margin-top:20px;background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius-lg);padding:16px 18px;font-size:13.5px;color:var(--rice-dim);text-align:center;}
  .note b{color:var(--rice);}

  .related{margin-top:24px;}
  .related h2{font-size:16px;font-weight:700;margin-bottom:10px;}
  .related-row{display:flex;gap:10px;}
  .related-card{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:13px;font-weight:700;text-align:center;}
  .related-card:hover{border-color:rgba(243,184,6,.35);}
  .related-card .ic{font-size:20px;display:block;margin-bottom:4px;}

  footer{padding:30px 0 4px;text-align:center;color:var(--rice-dim);font-size:12.5px;}

<body>

<div class="topbar"><div class="topbar-inner"><a class="back-link" href="../index.html">← everyday-tab</a></div></div>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">2048 Puzzle</div>
    <h1>🔢 2048</h1>
    <div class="score-row">
      <div class="score-box"><div class="lb">점수</div><div class="num" id="scoreText">0</div></div>
      <div class="score-box"><div class="lb">최고 점수</div><div class="num" id="bestText">0</div></div>
    </div>
  </section>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="overlay" id="overlay">
      <div class="msg" id="overlayMsg"></div>
      <button type="button" id="overlayBtn">다시 시작</button>
    </div>
  </div>

  <div class="btn-row">
    <button type="button" class="btn" id="restartBtn">🔄 새 게임</button>
  </div>

  <div class="note">
    <b>PC</b>는 방향키, <b>모바일</b>은 화면을 스와이프해서 타일을 움직여보세요. 같은 숫자 타일 두 개가 만나면 합쳐져요. 2048을 만들면 승리!
  </div>

  <div class="related">
    <h2>🔗 이런 것도 찾아보세요</h2>
    <div class="related-row">
      <a class="related-card" href="minesweeper.html"><span class="ic">💣</span>지뢰찾기</a>
      <a class="related-card" href="reaction-time.html"><span class="ic">⚡</span>반응속도 테스트</a>
    </div>
  </div>

  <footer>everyday-tab · 미니게임</footer>
</div>

<script>
(function(){
  "use strict";

  const SIZE = 4;
  const STORAGE_BEST = "et-2048-best";
  const TILE_COLORS = {
    2: ["#3a4238", "#F5F1E8"], 4: ["#4a5240", "#F5F1E8"], 8: ["#CE8548", "#1D231E"],
    16: ["#E0954F", "#1D231E"], 32: ["#E2704F", "#F5F1E8"], 64: ["#D95A3A", "#F5F1E8"],
    128: ["#F3B806", "#1D231E"], 256: ["#F3B806", "#1D231E"], 512: ["#F3B806", "#1D231E"],
    1024: ["#FFD84D", "#1D231E"], 2048: ["#8CB06A", "#132009"],
  };

  const boardEl = document.getElementById("board");
  const scoreText = document.getElementById("scoreText");
  const bestText = document.getElementById("bestText");
  const overlay = document.getElementById("overlay");
  const overlayMsg = document.getElementById("overlayMsg");
  const overlayBtn = document.getElementById("overlayBtn");
  const restartBtn = document.getElementById("restartBtn");

  let grid = [];
  let score = 0;
  let best = parseInt(localStorage.getItem(STORAGE_BEST) || "0", 10);
  let hasWon = false;
  let gameOver = false;

  function emptyGrid(){
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  }

  function getEmptyCells(){
    const cells = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === 0) cells.push([r, c]);
    return cells;
  }

  function addRandomTile(){
    const empties = getEmptyCells();
    if (!empties.length) return;
    const [r, c] = empties[Math.floor(Math.random() * empties.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function cellSize(){
    const boardWidth = boardEl.clientWidth;
    const gap = 8, padding = 8;
    return (boardWidth - padding * 2 - gap * (SIZE - 1)) / SIZE;
  }

  function renderBoard(){
    // 배경 셀 (최초 1회만)
    if (!boardEl.dataset.built){
      for (let i = 0; i < SIZE * SIZE; i++){
        const cell = document.createElement("div");
        cell.className = "cell";
        boardEl.appendChild(cell);
      }
      boardEl.dataset.built = "1";
    }
    // 기존 타일 제거
    boardEl.querySelectorAll(".tile").forEach(t => t.remove());

    const size = cellSize();
    const gap = 8, padding = 8;

    for (let r = 0; r < SIZE; r++){
      for (let c = 0; c < SIZE; c++){
        const val = grid[r][c];
        if (val === 0) continue;
        const tile = document.createElement("div");
        tile.className = "tile";
        const [bg, fg] = TILE_COLORS[val] || ["#8CB06A", "#132009"];
        tile.style.background = bg;
        tile.style.color = fg;
        tile.style.width = size + "px";
        tile.style.height = size + "px";
        tile.style.top = (padding + r * (size + gap)) + "px";
        tile.style.left = (padding + c * (size + gap)) + "px";
        tile.style.fontSize = (val >= 1024 ? size * 0.32 : size * 0.4) + "px";
        tile.textContent = val;
        boardEl.appendChild(tile);
      }
    }

    scoreText.textContent = score;
    bestText.textContent = best;
  }

  function slideRowLeft(row){
    const filtered = row.filter(v => v !== 0);
    const merged = [];
    let gained = 0;
    for (let i = 0; i < filtered.length; i++){
      if (filtered[i] === filtered[i + 1]){
        const val = filtered[i] * 2;
        merged.push(val);
        gained += val;
        if (val === 2048) hasWon = true;
        i++;
      } else {
        merged.push(filtered[i]);
      }
    }
    while (merged.length < SIZE) merged.push(0);
    return { row: merged, gained };
  }

  function rotateGridCW(g){
    const n = g.length;
    const res = emptyGrid();
    for (let r = 0; r < n; r++)
      for (let c = 0; c < n; c++)
        res[c][n - 1 - r] = g[r][c];
    return res;
  }

  function move(direction){
    // 항상 "왼쪽으로 슬라이드" 로직만 구현하고, 방향에 따라 회전시켜서 재사용
    let rotations = { left: 0, up: 1, right: 2, down: 3 }[direction];
    let g = grid;
    for (let i = 0; i < rotations; i++) g = rotateGridCW(g);

    let moved = false;
    let totalGain = 0;
    const newGrid = [];
    for (let r = 0; r < SIZE; r++){
      const { row, gained } = slideRowLeft(g[r]);
      totalGain += gained;
      if (row.join(",") !== g[r].join(",")) moved = true;
      newGrid.push(row);
    }
    g = newGrid;
    for (let i = 0; i < (4 - rotations) % 4; i++) g = rotateGridCW(g);

    if (moved){
      grid = g;
      score += totalGain;
      if (score > best){ best = score; localStorage.setItem(STORAGE_BEST, String(best)); }
      addRandomTile();
      renderBoard();
      checkGameState();
    }
  }

  function canMove(){
    if (getEmptyCells().length > 0) return true;
    for (let r = 0; r < SIZE; r++){
      for (let c = 0; c < SIZE; c++){
        const v = grid[r][c];
        if (c < SIZE - 1 && grid[r][c + 1] === v) return true;
        if (r < SIZE - 1 && grid[r + 1][c] === v) return true;
      }
    }
    return false;
  }

  function checkGameState(){
    if (hasWon && !overlay.classList.contains("won-shown")){
      overlay.classList.add("won-shown");
      showOverlay("🎉 2048 달성!");
      return;
    }
    if (!canMove()){
      gameOver = true;
      showOverlay("게임 오버");
    }
  }

  function showOverlay(msg){
    overlayMsg.textContent = msg;
    overlay.classList.add("show");
  }
  function hideOverlay(){
    overlay.classList.remove("show");
    overlay.classList.remove("won-shown");
  }

  function restart(){
    grid = emptyGrid();
    score = 0;
    hasWon = false;
    gameOver = false;
    hideOverlay();
    addRandomTile();
    addRandomTile();
    renderBoard();
  }

  document.addEventListener("keydown", (e) => {
    const map = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down" };
    if (map[e.key] && !gameOver){
      e.preventDefault();
      move(map[e.key]);
    }
  });

  // 터치 스와이프
  let touchStartX = 0, touchStartY = 0;
  boardEl.addEventListener("touchstart", (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  boardEl.addEventListener("touchend", (e) => {
    if (gameOver) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? "right" : "left");
    else move(dy > 0 ? "down" : "up");
  }, { passive: true });

  restartBtn.addEventListener("click", restart);
  overlayBtn.addEventListener("click", restart);
  window.addEventListener("resize", renderBoard);

  restart();
})();
</script>

</body>

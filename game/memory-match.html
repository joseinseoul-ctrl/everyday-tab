<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9;
    --radius-lg:22px; --radius-md:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%), var(--bg);
    color:var(--rice);font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;line-height:1.55;padding-bottom:60px;}
  h1,h2{font-family:"Noto Serif KR",serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;}
  button{font-family:inherit;}
  ::selection{background:var(--yolk);color:#1D231E;}
  :focus-visible{outline:2px solid var(--yolk);outline-offset:2px;}
  .wrap{max-width:520px;margin:0 auto;padding:0 20px;}

  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(29,35,30,0.86);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:520px;margin:0 auto;padding:12px 20px;}
  .back-link{font-size:13px;font-weight:700;color:var(--rice-dim);}
  .back-link:hover{color:var(--yolk);}

  .hero{padding:26px 0 10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--negi);text-transform:uppercase;}
  .hero h1{font-size:clamp(24px,6.5vw,32px);font-weight:900;}
  .hero p{max-width:38ch;color:var(--rice-dim);font-size:14px;margin:0;}

  .note{margin-top:20px;background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius-lg);padding:16px 18px;font-size:13px;color:var(--rice-dim);}
  .note b{color:var(--rice);}

  .related{margin-top:26px;}
  .related h2{font-size:16px;font-weight:700;margin-bottom:10px;}
  .related-row{display:flex;gap:10px;flex-wrap:wrap;}
  .related-card{flex:1;min-width:130px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:13px;font-weight:700;text-align:center;text-decoration:none;color:var(--rice);}
  .related-card:hover{border-color:rgba(243,184,6,.35);}
  .related-card .ic{font-size:20px;display:block;margin-bottom:4px;}

  footer{padding:30px 0 4px;text-align:center;color:var(--rice-dim);font-size:12.5px;}

<body>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Memory Card Match</div>
    <h1>🃏 기억력 카드 매칭</h1>
    <p>카드를 뒤집어서 같은 그림끼리 짝을 맞춰보세요. 시도 횟수와 시간이 적을수록 좋아요.</p>

<section class="mm-widget" id="mm-widget">
  <style>
    #mm-widget {
      --mm-surface: var(--surface);
      --mm-surface-2: var(--surface-2);
      --mm-line: var(--line);
      --mm-dim: var(--rice-dim);
      --mm-text: var(--rice);
      --mm-blue: #4C8DE0;
      --mm-blue-light: #35404A;
      --mm-green: #8CB06A;
      --mm-yellow: #F3B806;
      --mm-danger: #E2704F;
      --mm-radius-lg: 22px;
      --mm-radius-md: 14px;
      --mm-radius-sm: 10px;

      font-family: "Pretendard Variable","Pretendard",-apple-system,sans-serif;
      width: 100%;
      max-width: 480px;
      margin: 22px auto 0;
      box-sizing: border-box;
    }
    #mm-widget *, #mm-widget *::before, #mm-widget *::after {
      box-sizing: border-box;
    }

    #mm-widget .mm-card-frame {
      background: var(--mm-surface);
      border-radius: var(--mm-radius-lg);
      padding: 24px;
      border: 1px solid var(--mm-line);
    }

    #mm-widget .mm-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    #mm-widget .mm-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--mm-text);
      margin: 0;
      letter-spacing: -0.01em;
    }

    #mm-widget .mm-best {
      font-size: 12px;
      color: var(--mm-dim);
      font-weight: 600;
      background: var(--mm-surface-2);
      border: 1px solid var(--mm-line);
      padding: 6px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }

    #mm-widget .mm-best strong {
      color: var(--mm-yellow);
      font-weight: 800;
    }

    #mm-widget .mm-stats {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    #mm-widget .mm-stat-box {
      flex: 1;
      background: var(--mm-surface-2);
      border: 1px solid var(--mm-line);
      border-radius: var(--mm-radius-sm);
      padding: 10px 12px;
      text-align: center;
    }

    #mm-widget .mm-stat-label {
      font-size: 11px;
      color: var(--mm-dim);
      font-weight: 600;
      margin-bottom: 2px;
    }

    #mm-widget .mm-stat-value {
      font-size: 18px;
      color: var(--mm-text);
      font-weight: 700;
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
    }

    #mm-widget .mm-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    #mm-widget .mm-cell {
      aspect-ratio: 1 / 1;
      perspective: 800px;
      cursor: pointer;
    }

    #mm-widget .mm-cell.is-locked {
      cursor: default;
    }

    #mm-widget .mm-cell-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.35s cubic-bezier(0.4, 0.2, 0.2, 1);
    }

    #mm-widget .mm-cell.is-flipped .mm-cell-inner,
    #mm-widget .mm-cell.is-matched .mm-cell-inner {
      transform: rotateY(180deg);
    }

    #mm-widget .mm-face {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--mm-radius-sm);
      backface-visibility: hidden;
      font-size: 44px;
    }

    #mm-widget .mm-face-back {
      background: var(--mm-blue);
      font-size: 28px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--mm-line);
      transition: background-color 0.15s ease-out;
    }
    #mm-widget .mm-cell:not(.is-locked):hover .mm-face-back {
      background: #3f75c2;
    }

    #mm-widget .mm-face-front {
      background: var(--mm-blue-light);
      border: 1px solid var(--mm-line);
      transform: rotateY(180deg);
    }

    #mm-widget .mm-cell.is-matched .mm-face-front {
      background: rgba(140,176,106,0.16);
      border-color: rgba(140,176,106,0.4);
      opacity: 0.85;
    }

    #mm-widget .mm-cell.is-wrong .mm-face-front {
      background: rgba(226,112,79,0.16);
      border-color: rgba(226,112,79,0.4);
    }

    #mm-widget .mm-controls {
      display: flex;
      justify-content: center;
    }

    #mm-widget .mm-reset-btn {
      background: var(--mm-surface-2);
      color: var(--mm-text);
      border: 1px solid var(--mm-line);
      border-radius: var(--mm-radius-sm);
      padding: 10px 20px;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.15s ease-out;
    }
    #mm-widget .mm-reset-btn:hover {
      border-color: rgba(243,184,6,.4);
    }

    #mm-widget .mm-overlay {
      display: none;
      text-align: center;
      background: var(--mm-surface-2);
      border: 1px solid var(--mm-line);
      border-radius: var(--mm-radius-md);
      padding: 28px 20px;
      margin-bottom: 16px;
    }

    #mm-widget .mm-overlay.is-visible {
      display: block;
    }

    #mm-widget .mm-overlay-emoji {
      font-size: 34px;
      margin-bottom: 8px;
    }

    #mm-widget .mm-overlay-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--mm-text);
      margin: 0 0 12px;
    }

    #mm-widget .mm-overlay-stats {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 6px;
    }

    #mm-widget .mm-overlay-stat-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--mm-yellow);
      letter-spacing: -0.01em;
    }

    #mm-widget .mm-overlay-stat-label {
      font-size: 11px;
      color: var(--mm-dim);
      font-weight: 600;
      margin-top: 2px;
    }

    #mm-widget .mm-overlay-badge {
      display: inline-block;
      margin: 8px 0 14px;
      font-size: 12px;
      font-weight: 700;
      color: #241a00;
      background: var(--mm-yellow);
      padding: 4px 10px;
      border-radius: 999px;
    }

    #mm-widget .mm-overlay-retry-btn {
      background: var(--mm-surface);
      color: var(--mm-text);
      border: 1px solid var(--mm-line);
      border-radius: var(--mm-radius-sm);
      padding: 10px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.15s ease-out;
    }
    #mm-widget .mm-overlay-retry-btn:hover {
      border-color: rgba(243,184,6,.4);
    }

    #mm-widget .mm-board.is-hidden {
      display: none;
    }

    @media (max-width: 380px) {
      #mm-widget .mm-face {
        font-size: 32px;
      }
      #mm-widget .mm-face-back {
        font-size: 22px;
      }
    }
  </style>

  <div class="mm-card-frame">
    <div class="mm-header">
      <p class="mm-title">🃏 기억력 카드 매칭</p>
      <div class="mm-best">최고 기록 <strong id="mm-best-text">--</strong></div>
    </div>

    <div class="mm-stats">
      <div class="mm-stat-box">
        <div class="mm-stat-label">시도 횟수</div>
        <div class="mm-stat-value" id="mm-attempts">0</div>
      </div>
      <div class="mm-stat-box">
        <div class="mm-stat-label">경과 시간</div>
        <div class="mm-stat-value" id="mm-timer">0.0s</div>
      </div>
      <div class="mm-stat-box">
        <div class="mm-stat-label">남은 짝</div>
        <div class="mm-stat-value" id="mm-remaining">8</div>
      </div>
    </div>

    <div class="mm-overlay" id="mm-overlay">
      <div class="mm-overlay-emoji">🎉</div>
      <p class="mm-overlay-title">클리어했어요!</p>
      <div class="mm-overlay-stats">
        <div>
          <div class="mm-overlay-stat-value" id="mm-result-attempts">0</div>
          <div class="mm-overlay-stat-label">시도 횟수</div>
        </div>
        <div>
          <div class="mm-overlay-stat-value" id="mm-result-time">0.0s</div>
          <div class="mm-overlay-stat-label">경과 시간</div>
        </div>
      </div>
      <div id="mm-result-badge"></div>
      <div>
        <button type="button" class="mm-overlay-retry-btn" id="mm-overlay-retry-btn">다시 도전하기</button>
      </div>
    </div>

    <div class="mm-board" id="mm-board"></div>

    <div class="mm-controls">
      <button type="button" class="mm-reset-btn" id="mm-reset-btn">새로 시작하기</button>
    </div>
  </div>
</section>

  <div class="note">
    <b>Tip.</b> 시도 횟수는 두 장을 뒤집을 때마다 1씩 늘어나요. 최고 기록(시도 횟수 우선, 동률이면 시간)은 이 브라우저에 저장돼요.
  </div>

  <div class="related">
    <h2>🔗 이런 것도 찾아보세요</h2>
    <div class="related-row">
      <a class="related-card" href="simon-game.html"><span class="ic">🎨</span>사이먼 게임</a>
      <a class="related-card" href="2048.html"><span class="ic">🔢</span>2048</a>
    </div>
  </div>

  <footer>everyday-tab · 미니게임</footer>
</div>

<script>
(function () {
  var STORAGE_KEY = 'mm-widget-best-record';

  var EMOJIS = ['🍎', '🍋', '🍇', '🍉', '🍓', '🥝', '🍒', '🍑'];

  var boardEl = document.getElementById('mm-board');
  var attemptsEl = document.getElementById('mm-attempts');
  var timerEl = document.getElementById('mm-timer');
  var remainingEl = document.getElementById('mm-remaining');
  var bestTextEl = document.getElementById('mm-best-text');
  var overlayEl = document.getElementById('mm-overlay');
  var resultAttemptsEl = document.getElementById('mm-result-attempts');
  var resultTimeEl = document.getElementById('mm-result-time');
  var resultBadgeEl = document.getElementById('mm-result-badge');
  var resetBtn = document.getElementById('mm-reset-btn');
  var overlayRetryBtn = document.getElementById('mm-overlay-retry-btn');

  var cards = [];          // { id, emoji, matched }
  var flippedIds = [];     // 현재 뒤집힌 카드(최대 2개)
  var attempts = 0;
  var matchedPairs = 0;
  var totalPairs = EMOJIS.length;
  var isLocked = false;    // 두 장 비교 중 클릭 방지
  var isPlaying = false;
  var startTime = 0;
  var elapsedMs = 0;
  var tickId = null;

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function formatSeconds(ms) {
    return (ms / 1000).toFixed(1) + 's';
  }

  function getBestRecord() {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  }

  function setBestRecord(record) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(record));
  }

  function renderBestRecord() {
    var best = getBestRecord();
    bestTextEl.textContent = best ? (best.attempts + '회 / ' + formatSeconds(best.timeMs)) : '--';
  }

  // 기록이 기존 최고 기록보다 나은지 판단: 시도 횟수 우선, 동률이면 시간 비교
  function isBetterRecord(a, b) {
    if (a.attempts !== b.attempts) return a.attempts < b.attempts;
    return a.timeMs < b.timeMs;
  }

  function getBadgeText(attempts, timeMs) {
    if (attempts <= totalPairs + 2) return '완벽한 기억력! 🧠✨';
    if (attempts <= totalPairs + 6) return '훌륭해요, 기억력이 좋으시네요';
    return '조금 더 집중해서 도전해 보세요!';
  }

  function buildBoard() {
    var deck = shuffle(EMOJIS.concat(EMOJIS)).map(function (emoji, idx) {
      return { id: idx, emoji: emoji, matched: false };
    });
    cards = deck;
    boardEl.innerHTML = '';

    cards.forEach(function (card) {
      var cell = document.createElement('div');
      cell.className = 'mm-cell';
      cell.dataset.id = String(card.id);
      cell.innerHTML =
        '<div class="mm-cell-inner">' +
          '<div class="mm-face mm-face-back">?</div>' +
          '<div class="mm-face mm-face-front">' + card.emoji + '</div>' +
        '</div>';
      cell.addEventListener('click', function () { handleCardClick(card.id, cell); });
      boardEl.appendChild(cell);
    });
  }

  function startTimer() {
    startTime = performance.now();
    tickId = setInterval(function () {
      elapsedMs = performance.now() - startTime;
      timerEl.textContent = formatSeconds(elapsedMs);
    }, 100);
  }

  function stopTimer() {
    if (tickId) {
      clearInterval(tickId);
      tickId = null;
    }
  }

  function resetGame() {
    stopTimer();
    attempts = 0;
    matchedPairs = 0;
    flippedIds = [];
    isLocked = false;
    isPlaying = false;
    elapsedMs = 0;

    attemptsEl.textContent = '0';
    timerEl.textContent = '0.0s';
    remainingEl.textContent = String(totalPairs);
    overlayEl.classList.remove('is-visible');
    boardEl.classList.remove('is-hidden');

    buildBoard();
    renderBestRecord();
  }

  function handleCardClick(id, cellEl) {
    if (isLocked) return;
    if (cellEl.classList.contains('is-flipped') || cellEl.classList.contains('is-matched')) return;
    if (flippedIds.indexOf(id) !== -1) return;

    if (!isPlaying) {
      isPlaying = true;
      startTimer();
    }

    cellEl.classList.add('is-flipped', 'is-locked');
    flippedIds.push(id);

    if (flippedIds.length === 2) {
      attempts += 1;
      attemptsEl.textContent = String(attempts);
      isLocked = true;

      var firstId = flippedIds[0];
      var secondId = flippedIds[1];
      var firstCard = cards[firstId];
      var secondCard = cards[secondId];
      var firstCell = boardEl.querySelector('[data-id="' + firstId + '"]');
      var secondCell = boardEl.querySelector('[data-id="' + secondId + '"]');

      if (firstCard.emoji === secondCard.emoji) {
        setTimeout(function () {
          firstCell.classList.add('is-matched');
          secondCell.classList.add('is-matched');
          firstCard.matched = true;
          secondCard.matched = true;
          matchedPairs += 1;
          remainingEl.textContent = String(totalPairs - matchedPairs);
          flippedIds = [];
          isLocked = false;

          if (matchedPairs === totalPairs) {
            finishGame();
          }
        }, 380);
      } else {
        firstCell.classList.add('is-wrong');
        secondCell.classList.add('is-wrong');
        setTimeout(function () {
          firstCell.classList.remove('is-flipped', 'is-locked', 'is-wrong');
          secondCell.classList.remove('is-flipped', 'is-locked', 'is-wrong');
          flippedIds = [];
          isLocked = false;
        }, 700);
      }
    } else {
      // 첫 장을 뒤집는 순간에는 다음 클릭을 막지 않음
      cellEl.classList.remove('is-locked');
    }
  }

  function finishGame() {
    stopTimer();
    isPlaying = false;

    var record = { attempts: attempts, timeMs: Math.round(elapsedMs) };
    var best = getBestRecord();
    var isNewBest = !best || isBetterRecord(record, best);
    if (isNewBest) setBestRecord(record);
    renderBestRecord();

    resultAttemptsEl.textContent = String(attempts);
    resultTimeEl.textContent = formatSeconds(elapsedMs);
    resultBadgeEl.innerHTML =
      '<div class="mm-overlay-badge">' + (isNewBest ? '🏆 새로운 최고 기록  ·  ' : '') + getBadgeText(attempts, elapsedMs) + '</div>';

    boardEl.classList.add('is-hidden');
    overlayEl.classList.add('is-visible');
  }

  resetBtn.addEventListener('click', resetGame);
  overlayRetryBtn.addEventListener('click', resetGame);

  resetGame();
})();
</script>

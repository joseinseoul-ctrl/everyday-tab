<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9; --danger:#E2704F;

  .hero{padding:24px 0 6px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--negi);text-transform:uppercase;}
  .hero h1{font-size:clamp(26px,7vw,34px);font-weight:900;}

  .status-row{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:12px;}
  .status-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:8px 16px;text-align:center;min-width:70px;}
  .status-box .lb{font-size:10.5px;color:var(--rice-dim);}
  .status-box .num{font-size:18px;font-weight:900;color:var(--yolk);font-variant-numeric:tabular-nums;}
  .face-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:var(--surface-2);font-size:20px;cursor:pointer;}

  .board-wrap{position:relative;margin-top:16px;}
  .board{
    display:grid;grid-template-columns:repeat(9, 1fr);gap:3px;background:var(--surface-2);
    border-radius:var(--radius-lg);padding:8px;
  }
  .cell{
    aspect-ratio:1/1;border-radius:5px;background:rgba(245,241,232,0.08);border:none;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;cursor:pointer;color:var(--rice);
    padding:0;
  }
  .cell.revealed{background:rgba(245,241,232,0.03);cursor:default;}
  .cell.mine{background:var(--danger);}
  .cell.flag{color:var(--yolk);}
  .n1{color:#7EA6E0;} .n2{color:#8CB06A;} .n3{color:#E2704F;} .n4{color:#B98CE0;}
  .n5{color:#E0954F;} .n6{color:#5FC4C4;} .n7{color:#F5F1E8;} .n8{color:#B9B6A9;}

  .overlay{
    position:absolute;inset:0;border-radius:var(--radius-lg);background:rgba(29,35,30,0.92);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;
  }
  .overlay.show{display:flex;}
  .overlay .msg{font-size:20px;font-weight:900;color:var(--rice);}
  .overlay button{border:none;background:var(--yolk);color:#241a00;font-weight:800;padding:10px 22px;border-radius:999px;cursor:pointer;}

  .hint{margin-top:14px;text-align:center;font-size:12.5px;color:var(--rice-dim);}

  .note{margin-top:20px;background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius-lg);padding:16px 18px;font-size:13.5px;color:var(--rice-dim);text-align:center;}
  .note b{color:var(--rice);}

  .related{margin-top:24px;}
  .related h2{font-size:16px;font-weight:700;margin-bottom:10px;}
  .related-row{display:flex;gap:10px;}
  .related-card{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:13px;font-weight:700;text-align:center;}

<body>

<div class="topbar"><div class="topbar-inner"><a class="back-link" href="../index.html">← everyday-tab</a></div></div>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Minesweeper</div>
    <h1>💣 지뢰찾기</h1>

    <div class="status-row">
      <div class="status-box"><div class="lb">남은 지뢰</div><div class="num" id="mineCount">10</div></div>
      <button type="button" class="face-btn" id="faceBtn">🙂</button>
      <div class="status-box"><div class="lb">시간</div><div class="num" id="timeCount">0</div></div>
    </div>
  </section>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="overlay" id="overlay">
      <div class="msg" id="overlayMsg"></div>
      <button type="button" id="overlayBtn">다시 시작</button>
    </div>
  </div>

  <div class="hint">칸을 탭하면 열고, 길게 누르면(모바일) 또는 우클릭하면(PC) 깃발을 꽂아요.</div>

  <div class="note">
    <b>규칙.</b> 숫자는 주변 8칸에 있는 지뢰 개수예요. 모든 지뢰를 피해 나머지 칸을 다 열면 승리! 9×9, 지뢰 10개의 초급 난이도예요.
  </div>

  <div class="related">
    <h2>🔗 이런 것도 찾아보세요</h2>

    </div>
  </div>

  <footer>everyday-tab · 미니게임</footer>
</div>

<script>
(function(){
  "use strict";

  const SIZE = 9;
  const MINES = 10;

  const boardEl = document.getElementById("board");
  const mineCountEl = document.getElementById("mineCount");
  const timeCountEl = document.getElementById("timeCount");
  const faceBtn = document.getElementById("faceBtn");
  const overlay = document.getElementById("overlay");
  const overlayMsg = document.getElementById("overlayMsg");
  const overlayBtn = document.getElementById("overlayBtn");

  let cells = []; // { mine, revealed, flagged, adjacent }
  let firstClick = true;
  let gameOver = false;
  let won = false;
  let flagCount = 0;
  let revealedCount = 0;
  let timer = 0;
  let timerInterval = null;
  let longPressTimeout = null;

  function idx(r, c){ return r * SIZE + c; }

  function neighbors(r, c){
    const result = [];
    for (let dr = -1; dr <= 1; dr++){
      for (let dc = -1; dc <= 1; dc++){
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) result.push([nr, nc]);
      }
    }
    return result;
  }

  function buildBoard(safeR, safeC){
    cells = Array.from({ length: SIZE * SIZE }, () => ({ mine: false, revealed: false, flagged: false, adjacent: 0 }));

    let placed = 0;
    while (placed < MINES){
      const r = Math.floor(Math.random() * SIZE);
      const c = Math.floor(Math.random() * SIZE);
      if (cells[idx(r, c)].mine) continue;
      if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue; // 첫 클릭 주변엔 지뢰 없음
      cells[idx(r, c)].mine = true;
      placed++;
    }

    for (let r = 0; r < SIZE; r++){
      for (let c = 0; c < SIZE; c++){
        if (cells[idx(r, c)].mine) continue;
        cells[idx(r, c)].adjacent = neighbors(r, c).filter(([nr, nc]) => cells[idx(nr, nc)].mine).length;
      }
    }
  }

  function revealCell(r, c){
    const cell = cells[idx(r, c)];
    if (cell.revealed || cell.flagged) return;
    cell.revealed = true;
    revealedCount++;

    if (cell.adjacent === 0 && !cell.mine){
      neighbors(r, c).forEach(([nr, nc]) => revealCell(nr, nc));
    }
  }

  function revealAllMines(){
    cells.forEach(cell => { if (cell.mine) cell.revealed = true; });
  }

  function checkWin(){
    const totalSafe = SIZE * SIZE - MINES;
    if (revealedCount >= totalSafe){
      won = true;
      endGame(true);
    }
  }

  function endGame(isWin){
    gameOver = true;
    clearInterval(timerInterval);
    faceBtn.textContent = isWin ? "😎" : "💥";
    overlayMsg.textContent = isWin ? "🎉 승리!" : "💥 지뢰를 밟았어요";
    overlay.classList.add("show");
  }

  function render(){
    boardEl.innerHTML = "";
    for (let r = 0; r < SIZE; r++){
      for (let c = 0; c < SIZE; c++){
        const cell = cells[idx(r, c)];
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "cell" + (cell.revealed ? " revealed" : "") + (cell.revealed && cell.mine ? " mine" : "") + (cell.flagged ? " flag" : "");

        if (cell.revealed){
          if (cell.mine) btn.textContent = "💣";
          else if (cell.adjacent > 0){
            btn.textContent = cell.adjacent;
            btn.classList.add("n" + cell.adjacent);
          }
        } else if (cell.flagged){
          btn.textContent = "🚩";
        }

        btn.dataset.r = r;
        btn.dataset.c = c;
        boardEl.appendChild(btn);
      }
    }
    mineCountEl.textContent = Math.max(MINES - flagCount, 0);
    timeCountEl.textContent = timer;
  }

  function handleReveal(r, c){
    if (gameOver) return;
    const cell = cells[idx(r, c)];
    if (cell.flagged || cell.revealed) return;

    if (firstClick){
      buildBoard(r, c);
      firstClick = false;
      timerInterval = setInterval(() => { timer++; render(); }, 1000);
    }

    const target = cells[idx(r, c)];
    if (target.mine){
      target.revealed = true;
      revealAllMines();
      render();
      endGame(false);
      return;
    }

    revealCell(r, c);
    render();
    checkWin();
  }

  function handleFlag(r, c){
    if (gameOver) return;
    const cell = cells[idx(r, c)];
    if (cell.revealed) return;
    cell.flagged = !cell.flagged;
    flagCount += cell.flagged ? 1 : -1;
    render();
  }

  boardEl.addEventListener("click", (e) => {
    const btn = e.target.closest(".cell");
    if (!btn) return;
    handleReveal(parseInt(btn.dataset.r, 10), parseInt(btn.dataset.c, 10));
  });

  boardEl.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    const btn = e.target.closest(".cell");
    if (!btn) return;
    handleFlag(parseInt(btn.dataset.r, 10), parseInt(btn.dataset.c, 10));
  });

  // 모바일 길게 누르기 -> 깃발
  boardEl.addEventListener("touchstart", (e) => {
    const btn = e.target.closest(".cell");
    if (!btn) return;
    longPressTimeout = setTimeout(() => {
      handleFlag(parseInt(btn.dataset.r, 10), parseInt(btn.dataset.c, 10));
      longPressTimeout = null;
    }, 450);
  }, { passive: true });
  boardEl.addEventListener("touchend", () => {
    if (longPressTimeout){ clearTimeout(longPressTimeout); longPressTimeout = null; }
  });
  boardEl.addEventListener("touchmove", () => {
    if (longPressTimeout){ clearTimeout(longPressTimeout); longPressTimeout = null; }
  });

  function restart(){
    cells = Array.from({ length: SIZE * SIZE }, () => ({ mine: false, revealed: false, flagged: false, adjacent: 0 }));
    firstClick = true;
    gameOver = false;
    won = false;
    flagCount = 0;
    revealedCount = 0;
    timer = 0;
    clearInterval(timerInterval);
    faceBtn.textContent = "🙂";
    overlay.classList.remove("show");
    render();
  }

  faceBtn.addEventListener("click", restart);
  overlayBtn.addEventListener("click", restart);

  restart();
})();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta property="og:type" content="website">
<meta property="og:url" content="https://www.everyday-tab.com/calculator/d-day.html">
<meta property="og:site_name" content="Everyday Tab">
<meta property="og:title" content="D-Day 계산기 | Everyday Tab">
<meta property="og:description" content="기념일, 시험일까지 남은 날짜를 D-Day로 계산해보세요.">

<meta name="twitter:title" content="D-Day 계산기 | Everyday Tab">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9; --danger:#E2704F;
    --radius-lg:22px; --radius-md:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%), var(--bg);
    color:var(--rice);font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;line-height:1.55;padding-bottom:60px;}
  h1,h2{font-family:"Noto Serif KR",serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;}
  button,input{font-family:inherit;}
  ::selection{background:var(--yolk);color:#1D231E;}
  :focus-visible{outline:2px solid var(--yolk);outline-offset:2px;}
  .wrap{max-width:520px;margin:0 auto;padding:0 20px;}

  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(29,35,30,0.86);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:520px;margin:0 auto;padding:12px 20px;}
  .back-link{font-size:13px;font-weight:700;color:var(--rice-dim);}
  .back-link:hover{color:var(--yolk);}

  .hero{padding:30px 0 10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--negi);text-transform:uppercase;}
  .hero h1{font-size:clamp(26px,7vw,36px);font-weight:900;}
  .hero p{max-width:40ch;color:var(--rice-dim);font-size:14.5px;margin:0;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;margin-top:22px;display:flex;flex-direction:column;gap:16px;}
  label{display:flex;flex-direction:column;gap:6px;font-size:13.5px;font-weight:700;color:var(--rice-dim);}
  input[type="date"], input[type="text"]{
    height:50px;border-radius:var(--radius-md);border:1px solid var(--line);background:var(--surface-2);
    color:var(--rice);padding:0 14px;font-size:16px;font-weight:700;outline:none;width:100%;
  }

  .quick-row{display:flex;gap:6px;flex-wrap:wrap;}
  .quick-btn{border:1px solid var(--line);background:var(--surface-2);color:var(--rice-dim);border-radius:999px;
    padding:7px 12px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .quick-btn:hover{color:var(--yolk);border-color:rgba(243,184,6,.35);}

  .result{padding:30px 10px;border-radius:var(--radius-lg);border:1px solid var(--line);background:var(--surface-2);
    display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
  .placeholder{color:var(--rice-dim);font-size:13.5px;}
  .result .num{font-size:54px;font-weight:900;color:var(--yolk);}
  .result .sub{font-size:13px;color:var(--rice-dim);}

  .note{margin-top:20px;background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius-lg);padding:16px 18px;font-size:13.5px;color:var(--rice-dim);}
  .note b{color:var(--rice);}

  .related{margin-top:26px;}
  .related h2{font-size:16px;font-weight:700;margin-bottom:10px;}
  .related-row{display:flex;gap:10px;}
  .related-card{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:13px;font-weight:700;text-align:center;}
  .related-card:hover{border-color:rgba(243,184,6,.35);}
  .related-card .ic{font-size:20px;display:block;margin-bottom:4px;}

  footer{padding:30px 0 4px;text-align:center;color:var(--rice-dim);font-size:12.5px;}
</style>
</head>
<body>

<div class="topbar"><div class="topbar-inner"><a class="back-link" href="../index.html">← everyday-tab</a></div></div>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">D-Day Calculator</div>
    <h1>📅 D-Day 계산기</h1>
    <p>기념일이나 시험일 등 목표 날짜를 입력하면 오늘 기준 D-Day를 계산해드려요.</p>
  </section>

  <div class="card">
    <label>
      목표 날짜
      <input type="date" id="targetInput">
    </label>
    <div class="quick-row">
      <button type="button" class="quick-btn" data-days="7">일주일 뒤</button>
      <button type="button" class="quick-btn" data-days="30">한 달 뒤</button>
      <button type="button" class="quick-btn" data-days="100">100일 뒤</button>
      <button type="button" class="quick-btn" data-days="365">1년 뒤</button>
    </div>

    <div class="result" id="resultBox">
      <span class="placeholder">날짜를 선택해주세요</span>
    </div>
  </div>

  <div class="note">
    <b>Tip.</b> 오늘을 D-Day(0)로 계산합니다. 목표일이 지난 날짜라면 D+로 표시돼요.
  </div>

  <div class="related">
    <h2>🔗 이런 것도 찾아보세요</h2>
    <div class="related-row">
      <a class="related-card" href="bmi.html"><span class="ic">⚖️</span>BMI 계산기</a>
      <a class="related-card" href="../baby/baby-days.html"><span class="ic">👶</span>생후일수 계산기</a>
    </div>
  </div>

  <footer>everyday-tab · 생활 계산기</footer>
</div>

<script>
(function(){
  "use strict";
  const targetInput = document.getElementById("targetInput");
  const resultBox = document.getElementById("resultBox");
  const quickRow = document.querySelector(".quick-row");

  function todayMidnight(){
    const d = new Date();
    d.setHours(0,0,0,0);
    return d;
  }

  function formatDate(d){
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    const week = ["일","월","화","수","목","금","토"][d.getDay()];
    return `${y}.${m}.${day} (${week})`;
  }

  function render(){
    const val = targetInput.value;
    if (!val){
      resultBox.innerHTML = '<span class="placeholder">날짜를 선택해주세요</span>';
      return;
    }
    const target = new Date(val + "T00:00:00");
    const today = todayMidnight();
    const diffDays = Math.round((target - today) / 86400000);

    let text;
    if (diffDays === 0) text = "D-Day";
    else if (diffDays > 0) text = "D-" + diffDays;
    else text = "D+" + Math.abs(diffDays);

    resultBox.innerHTML =
      '<div class="num">' + text + '</div>' +
      '<div class="sub">' + formatDate(target) + '</div>';
  }

  quickRow.addEventListener("click", (e) => {
    const btn = e.target.closest(".quick-btn");
    if (!btn) return;
    const days = parseInt(btn.dataset.days, 10);
    const d = todayMidnight();
    d.setDate(d.getDate() + days);
    targetInput.value = d.toISOString().slice(0, 10);
    render();
  });

  targetInput.addEventListener("change", render);
})();
</script>
<script src="../share.js" defer></script>
</body>
</html>

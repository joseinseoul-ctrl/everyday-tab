<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="금리 상승 스트레스 계산기 | Everyday Tab">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9; --danger:#E2704F;
    --radius-lg:22px; --radius-md:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%), var(--bg);
    color:var(--rice);font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;line-height:1.55;padding-bottom:60px;}
  h1,h2{font-family:"Noto Serif KR",serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;}
  button,input{font-family:inherit;}
  ::selection{background:var(--yolk);color:#1D231E;}
  :focus-visible{outline:2px solid var(--yolk);outline-offset:2px;}
  .wrap{max-width:560px;margin:0 auto;padding:0 20px;}

  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(29,35,30,0.86);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:560px;margin:0 auto;padding:12px 20px;}
  .back-link{font-size:13px;font-weight:700;color:var(--rice-dim);}
  .back-link:hover{color:var(--yolk);}

  .hero{padding:30px 0 10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--negi);text-transform:uppercase;}
  .hero h1{font-size:clamp(24px,6.5vw,34px);font-weight:900;}
  .hero p{max-width:42ch;color:var(--rice-dim);font-size:14.5px;margin:0;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;margin-top:22px;display:flex;flex-direction:column;gap:16px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  label{display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:700;color:var(--rice-dim);}
  input[type="number"]{
    height:46px;border-radius:var(--radius-md);border:1px solid var(--line);background:var(--surface-2);
    color:var(--rice);padding:0 14px;font-size:15px;font-weight:700;outline:none;width:100%;
  }

  .stress-group{display:flex;gap:6px;}
  .stress-btn{flex:1;height:42px;border-radius:999px;border:1px solid var(--line);background:var(--surface-2);
    color:var(--rice-dim);font-size:13px;font-weight:800;cursor:pointer;}
  .stress-btn.active{background:var(--danger);color:#fff;border-color:var(--danger);}

  .result{padding:22px;border-radius:var(--radius-lg);border:1px solid var(--line);background:var(--surface-2);}
  .placeholder{color:var(--rice-dim);font-size:13.5px;text-align:center;display:block;padding:16px 0;}
  .compare{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;}
  .compare-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;text-align:center;}
  .compare-card .lb{font-size:11.5px;color:var(--rice-dim);}
  .compare-card .num{margin-top:4px;font-size:19px;font-weight:900;color:var(--rice);}
  .compare-card.after .num{color:var(--danger);}
  .arrow{font-size:20px;color:var(--rice-dim);}
  .increase-badge{margin-top:14px;text-align:center;padding:10px;border-radius:999px;background:rgba(226,112,79,0.1);
    border:1px solid rgba(226,112,79,0.3);color:var(--danger);font-weight:800;font-size:14px;}

  .note{margin-top:20px;background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius-lg);padding:16px 18px;font-size:13px;color:var(--rice-dim);}
  .note b{color:var(--rice);}

  .related{margin-top:26px;}
  .related h2{font-size:16px;font-weight:700;margin-bottom:10px;}
  .related-row{display:flex;gap:10px;flex-wrap:wrap;}
  .related-card{flex:1;min-width:130px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:13px;font-weight:700;text-align:center;}
  .related-card:hover{border-color:rgba(243,184,6,.35);}
  .related-card .ic{font-size:20px;display:block;margin-bottom:4px;}

  footer{padding:30px 0 4px;text-align:center;color:var(--rice-dim);font-size:12.5px;}
</style>
</head>
<body>

<div class="topbar"><div class="topbar-inner"><a class="back-link" href="../index.html">← everyday-tab</a></div></div>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Interest Rate Stress Test</div>
    <h1>📊 금리 상승 스트레스 계산기</h1>
    <p>지금 받은 대출 금리가 오르면, 월 상환액이 얼마나 늘어나는지 미리 확인해보세요.</p>
  </section>

  <div class="card">
    <div class="field-row">
      <label>대출 원금 (만원)
        <input type="number" id="principalInput" inputmode="numeric" placeholder="20000">
      </label>
      <label>현재 금리 (연 %)
        <input type="number" id="rateInput" inputmode="decimal" step="0.1" placeholder="4.0">
      </label>
    </div>
    <label>대출 기간 (년)
      <input type="number" id="yearsInput" inputmode="numeric" placeholder="30">
    </label>

    <label>스트레스 시나리오
      <div class="stress-group" id="stressGroup">
        <button type="button" class="stress-btn" data-add="1">+1%p</button>
        <button type="button" class="stress-btn active" data-add="2">+2%p</button>
        <button type="button" class="stress-btn" data-add="3">+3%p</button>
      </div>
    </label>

    <div class="result" id="resultBox">
      <span class="placeholder">대출 조건을 입력해주세요</span>
    </div>
  </div>

  <div class="note">
    <b>Tip.</b> 변동금리 대출이나 곧 금리 갱신 시기가 다가온다면, 최소 +2~3%p 상승 시나리오까지 감당 가능한지 미리 점검해보는 게 안전해요. 원리금균등상환 기준으로 계산했습니다.
  </div>

  <div class="related">
    <h2>🔗 이런 것도 찾아보세요</h2>
    <div class="related-row">
      <a class="related-card" href="dsr-calculator.html"><span class="ic">⚠️</span>DSR 계산기</a>
      <a class="related-card" href="../calculator/loan-interest.html"><span class="ic">🏦</span>대출이자 계산기</a>
    </div>
  </div>

  <footer>everyday-tab · 부동산투자 도구</footer>
</div>

<script>
(function(){
  "use strict";

  const principalInput = document.getElementById("principalInput");
  const rateInput = document.getElementById("rateInput");
  const yearsInput = document.getElementById("yearsInput");
  const stressGroup = document.getElementById("stressGroup");
  const resultBox = document.getElementById("resultBox");
  let stressAdd = 2;

  function formatManwon(n){
    return Math.round(n).toLocaleString("ko-KR") + "만원";
  }

  function monthlyPayment(principal, annualRate, years){
    const n = years * 12;
    const r = annualRate / 100 / 12;
    if (r === 0) return principal / n;
    const factor = Math.pow(1 + r, n);
    return principal * r * factor / (factor - 1);
  }

  function render(){
    const principal = parseFloat(principalInput.value) * 10000;
    const rate = parseFloat(rateInput.value);
    const years = parseFloat(yearsInput.value);

    if (!(principal > 0) || !(rate >= 0) || !(years > 0)){
      resultBox.innerHTML = '<span class="placeholder">대출 조건을 입력해주세요</span>';
      return;
    }

    const before = monthlyPayment(principal, rate, years);
    const after = monthlyPayment(principal, rate + stressAdd, years);
    const increase = after - before;
    const increaseRate = (increase / before) * 100;

    resultBox.innerHTML =
      '<div class="compare">' +
        '<div class="compare-card"><div class="lb">현재 (' + rate + '%)</div><div class="num">' + formatManwon(before / 10000) + '</div></div>' +
        '<div class="arrow">→</div>' +
        '<div class="compare-card after"><div class="lb">+' + stressAdd + '%p (' + (rate + stressAdd).toFixed(1) + '%)</div><div class="num">' + formatManwon(after / 10000) + '</div></div>' +
      '</div>' +
      '<div class="increase-badge">월 상환액 ' + formatManwon(increase / 10000) + ' 증가 (+' + increaseRate.toFixed(1) + '%)</div>';
  }

  stressGroup.addEventListener("click", (e) => {
    const btn = e.target.closest(".stress-btn");
    if (!btn) return;
    stressAdd = parseFloat(btn.dataset.add);
    stressGroup.querySelectorAll(".stress-btn").forEach(b => b.classList.toggle("active", b === btn));
    render();
  });

  [principalInput, rateInput, yearsInput].forEach(el => el.addEventListener("input", render));
})();
</script>
<script src="../share.js" defer></script>
</body>
</html>

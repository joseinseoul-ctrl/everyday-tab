<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>타자 연습 · 공부 도구</title>
<meta name="description" content="짧은 문장으로 타자 속도와 정확도를 측정하고 연습합니다.">

<meta property="og:type" content="website">
<meta property="og:url" content="https://www.everyday-tab.com/study/typing-practice.html">

<meta property="og:title" content="타자 연습 | Everyday Tab">
<meta property="og:description" content="짧은 문장으로 타자 속도와 정확도를 측정하고 연습합니다.">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="타자 연습 | Everyday Tab">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9; --danger:#E2704F;
    --radius-lg:22px; --radius-md:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%), var(--bg);
    color:var(--rice);font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;line-height:1.55;padding-bottom:60px;}
  h1,h2{font-family:"Noto Serif KR",serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;}
  button,textarea{font-family:inherit;}
  ::selection{background:var(--yolk);color:#1D231E;}
  :focus-visible{outline:2px solid var(--yolk);outline-offset:2px;}
  .wrap{max-width:560px;margin:0 auto;padding:0 20px;}

  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(29,35,30,0.86);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:560px;margin:0 auto;padding:12px 20px;}
  .back-link{font-size:13px;font-weight:700;color:var(--rice-dim);}
  .back-link:hover{color:var(--yolk);}

  .hero{padding:30px 0 10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--negi);text-transform:uppercase;}
  .hero h1{font-size:clamp(26px,7vw,36px);font-weight:900;}
  .hero p{max-width:40ch;color:var(--rice-dim);font-size:14.5px;margin:0;}

  .stat-row{display:flex;gap:10px;margin-top:16px;}
  .stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:12px;text-align:center;}
  .stat .lb{font-size:11.5px;color:var(--rice-dim);}
  .stat .num{margin-top:2px;font-size:20px;font-weight:900;color:var(--yolk);}

  .target-box{margin-top:18px;padding:20px;border-radius:var(--radius-lg);border:1px solid var(--line);background:var(--surface);
    font-size:18px;line-height:1.7;letter-spacing:0.01em;}
  .target-box .correct{color:var(--negi);}
  .target-box .wrong{color:var(--danger);text-decoration:underline;}
  .target-box .pending{color:var(--rice-dim);}
  .target-box .cursor{border-left:2px solid var(--yolk);}

  textarea{
    margin-top:12px;width:100%;min-height:90px;border-radius:var(--radius-md);border:1px solid var(--line);
    background:var(--surface-2);color:var(--rice);padding:14px;font-size:16px;outline:none;resize:none;
  }
  textarea:focus{border-color:rgba(243,184,6,.4);}

  .btn-row{margin-top:14px;display:flex;justify-content:center;}
  .btn{border:none;border-radius:999px;padding:11px 22px;font-size:13.5px;font-weight:800;cursor:pointer;background:var(--yolk);color:#241a00;}

  .result-banner{margin-top:16px;padding:18px;border-radius:var(--radius-lg);border:1px solid rgba(140,176,106,.4);background:rgba(140,176,106,.08);
    text-align:center;display:none;}
  .result-banner.show{display:block;}
  .result-banner .num{font-size:26px;font-weight:900;color:var(--negi);}

  .note{margin-top:20px;background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius-lg);padding:16px 18px;font-size:13.5px;color:var(--rice-dim);}
  .note b{color:var(--rice);}

  .related{margin-top:26px;}
  .related h2{font-size:16px;font-weight:700;margin-bottom:10px;}
  .related-row{display:flex;gap:10px;}
  .related-card{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:13px;font-weight:700;text-align:center;}
  .related-card:hover{border-color:rgba(243,184,6,.35);}
  .related-card .ic{font-size:20px;display:block;margin-bottom:4px;}

  footer{padding:30px 0 4px;text-align:center;color:var(--rice-dim);font-size:12.5px;}
</style>
</head>
<body>

<div class="topbar"><div class="topbar-inner"><a class="back-link" href="../index.html">← everyday-tab</a></div></div>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Typing Practice</div>
    <h1>⌨️ 타자 연습</h1>
    <p>아래 문장을 그대로 따라 입력해서 타자 속도와 정확도를 측정해보세요.</p>
  </section>

  <div class="stat-row">
    <div class="stat"><div class="lb">경과 시간</div><div class="num" id="timeStat">0.0초</div></div>
    <div class="stat"><div class="lb">타수(글자/분)</div><div class="num" id="speedStat">0</div></div>
    <div class="stat"><div class="lb">정확도</div><div class="num" id="accuracyStat">100%</div></div>
  </div>

  <div class="target-box" id="targetBox"></div>
  <textarea id="typingInput" placeholder="여기에 입력을 시작하세요" autocomplete="off" autocapitalize="off" spellcheck="false"></textarea>

  <div class="result-banner" id="resultBanner">
    <div class="num" id="resultNum"></div>
    <div style="font-size:12.5px;color:var(--rice-dim);margin-top:4px;">완료했어요! 다시 도전해보세요.</div>
  </div>

  <div class="btn-row">
    <button type="button" class="btn" id="retryBtn">새 문장으로 다시 시작</button>
  </div>

  <div class="note">
    <b>Tip.</b> 타수는 목표 문장의 글자 수를 경과 시간(분)으로 나눈 값이에요. 실제 키보드 타건 수(자모 단위)를 재는 프로그램과는 계산 방식이 달라 수치가 다를 수 있어요.
  </div>

  <div class="related">
    <h2>🔗 이런 것도 찾아보세요</h2>
    <div class="related-row">
      <a class="related-card" href="pomodoro.html"><span class="ic">🍅</span>포모도로 타이머</a>
      <a class="related-card" href="gpa-calculator.html"><span class="ic">🎓</span>학점 계산기</a>
    </div>
  </div>

  <footer>everyday-tab · 공부 도구</footer>
</div>

<script>
(function(){
  "use strict";

  const SENTENCES = [
    "오늘 할 일을 내일로 미루지 않는 것이 성공의 첫걸음입니다.",
    "가장 어두운 밤도 지나면 반드시 해가 뜨기 마련입니다.",
    "작은 습관이 쌓여 결국 큰 변화를 만들어냅니다.",
    "노력은 배신하지 않는다는 말을 믿고 꾸준히 나아가자.",
    "실패를 두려워하지 않는 사람이 결국 더 멀리 나아간다.",
    "천 리 길도 한 걸음부터 시작된다는 것을 기억하세요.",
    "꾸준한 연습이 완벽한 실력을 만든다는 사실을 잊지 말자.",
    "오늘의 작은 노력이 내일의 큰 결실로 돌아올 것입니다.",
  ];

  const targetBox = document.getElementById("targetBox");
  const typingInput = document.getElementById("typingInput");
  const timeStat = document.getElementById("timeStat");
  const speedStat = document.getElementById("speedStat");
  const accuracyStat = document.getElementById("accuracyStat");
  const resultBanner = document.getElementById("resultBanner");
  const resultNum = document.getElementById("resultNum");
  const retryBtn = document.getElementById("retryBtn");

  let target = "";
  let startTime = null;
  let finished = false;
  let tickInterval = null;

  function pickSentence(){
    return SENTENCES[Math.floor(Math.random() * SENTENCES.length)];
  }

  function renderTarget(typed){
    let html = "";
    for (let i = 0; i < target.length; i++){
      const ch = target[i];
      if (i < typed.length){
        html += '<span class="' + (typed[i] === ch ? "correct" : "wrong") + '">' + ch + '</span>';
      } else if (i === typed.length){
        html += '<span class="pending cursor">' + ch + '</span>';
      } else {
        html += '<span class="pending">' + ch + '</span>';
      }
    }
    targetBox.innerHTML = html;
  }

  function updateStats(){
    if (!startTime) return;
    const elapsedSec = (Date.now() - startTime) / 1000;
    timeStat.textContent = elapsedSec.toFixed(1) + "초";
    const typed = typingInput.value;
    const minutes = elapsedSec / 60;
    const speed = minutes > 0 ? Math.round(typed.length / minutes) : 0;
    speedStat.textContent = speed;
  }

  function computeAccuracy(typed){
    let correct = 0;
    for (let i = 0; i < typed.length; i++){
      if (typed[i] === target[i]) correct++;
    }
    return typed.length > 0 ? Math.round((correct / typed.length) * 100) : 100;
  }

  function finish(){
    finished = true;
    clearInterval(tickInterval);
    const elapsedSec = (Date.now() - startTime) / 1000;
    const minutes = elapsedSec / 60;
    const speed = minutes > 0 ? Math.round(target.length / minutes) : 0;
    const accuracy = computeAccuracy(typingInput.value);
    speedStat.textContent = speed;
    accuracyStat.textContent = accuracy + "%";
    resultNum.textContent = speed + "타/분 · 정확도 " + accuracy + "%";
    resultBanner.classList.add("show");
    typingInput.disabled = true;
  }

  function reset(){
    target = pickSentence();
    startTime = null;
    finished = false;
    clearInterval(tickInterval);
    typingInput.value = "";
    typingInput.disabled = false;
    resultBanner.classList.remove("show");
    timeStat.textContent = "0.0초";
    speedStat.textContent = "0";
    accuracyStat.textContent = "100%";
    renderTarget("");
    typingInput.focus();
  }

  typingInput.addEventListener("input", () => {
    if (finished) return;
    if (!startTime){
      startTime = Date.now();
      tickInterval = setInterval(updateStats, 200);
    }
    const typed = typingInput.value;
    renderTarget(typed);
    accuracyStat.textContent = computeAccuracy(typed) + "%";

    if (typed.length >= target.length){
      finish();
    }
  });

  retryBtn.addEventListener("click", reset);

  reset();
})();
</script>
<script src="../share.js" defer></script>
</body>
</html>

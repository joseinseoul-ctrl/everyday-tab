<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link rel="canonical" href="https://www.everyday-tab.com/">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.everyday-tab.com/">
<meta property="og:site_name" content="Everyday Tab">
<meta property="og:title" content="everyday-tab · 매일 열어보는 나만의 생활 도구함">
<meta property="og:description" content="레시피, 계산기, 미니게임까지. 매일 필요한 생활 도구를 검색 하나로 찾으세요.">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="everyday-tab · 매일 열어보는 나만의 생활 도구함">
<meta name="twitter:description" content="레시피, 계산기, 미니게임까지. 매일 필요한 생활 도구를 검색 하나로 찾으세요.">
<meta name="naver-site-verification" content="dbb5fd93bbf7ddbbb24501896cc227afe76a9064" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --yolk-deep:#C98F00; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9; --danger:#E2704F;
    --radius-lg:22px; --radius-md:14px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:
      radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%),
      radial-gradient(circle at 88% 8%, rgba(140,176,106,0.08), transparent 40%),
      var(--bg);
    color:var(--rice);font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;
    line-height:1.55;padding-bottom:76px;}
  h1,h2{font-family:"Noto Serif KR",serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;text-decoration:none;}
  button,input,select{font-family:inherit;}
  ::selection{background:var(--yolk);color:#1D231E;}
  :focus-visible{outline:2px solid var(--yolk);outline-offset:2px;}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px;}
  .no-scrollbar{scrollbar-width:none;}
  .no-scrollbar::-webkit-scrollbar{display:none;}

  /* ---------- 상단 고정바 + 검색 ---------- */
  .topbar{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(29,35,30,0.9);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:1040px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:14px;}
  .brand{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;white-space:nowrap;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--yolk);box-shadow:0 0 0 4px rgba(243,184,6,0.18);}
  .brand span{color:var(--yolk);}

  .search-box{position:relative;flex:1;max-width:520px;}
  .search-input-row{display:flex;align-items:center;gap:8px;height:40px;border-radius:999px;border:1px solid var(--line);background:var(--surface);padding:0 14px;}
  .search-input-row svg{flex:none;opacity:.6;}
  #searchInput{flex:1;height:100%;border:none;background:transparent;color:var(--rice);font-size:14px;outline:none;}
  #searchInput::placeholder{color:var(--rice-dim);}

  .search-dropdown{
    position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius-md);box-shadow:0 14px 32px rgba(0,0,0,0.45);max-height:70vh;overflow-y:auto;
    display:none;padding:6px;z-index:60;
  }
  .search-dropdown.open{display:block;}
  .dd-section-title{font-size:11px;font-weight:800;color:var(--rice-dim);padding:8px 10px 4px;}
  .dd-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;}
  .dd-item:hover, .dd-item.active{background:var(--surface-2);}
  .dd-item .dd-icon{font-size:17px;}
  .dd-item .dd-title{font-size:13.5px;color:var(--rice);flex:1;}
  .dd-item .dd-desc{font-size:11.5px;color:var(--rice-dim);}
  .dd-item .dd-cat{font-size:11px;color:var(--rice-dim);flex:none;}
  .dd-empty{padding:20px;text-align:center;font-size:13px;color:var(--rice-dim);}
  .dd-chip-row{display:flex;flex-wrap:wrap;gap:6px;padding:4px 10px 10px;}
  .dd-chip{font-size:12px;padding:5px 10px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);color:var(--rice-dim);cursor:pointer;}
  .dd-chip:hover{color:var(--yolk);border-color:rgba(243,184,6,0.35);}

  /* ---------- 히어로 ---------- */
  .hero{padding:38px 0 18px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--negi);text-transform:uppercase;}
  .hero h1{font-size:clamp(32px,8vw,50px);font-weight:900;color:var(--rice);}
  .hero h1 .tab{color:var(--yolk);}
  .hero p.desc{max-width:46ch;color:var(--rice-dim);font-size:15px;margin:0;}
  .popular-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px;}
  .popular-row span.label{font-size:12px;color:var(--rice-dim);align-self:center;}

  /* ---------- 섹션 공통 ---------- */
  section.block{padding:22px 0;}
  .block-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
  .block-head h2{font-size:18px;font-weight:700;color:var(--rice);}
  .block-head .more{font-size:12.5px;font-weight:700;color:var(--rice-dim);}
  .block-head .more:hover{color:var(--yolk);}

  /* ---------- 카테고리 그리드 ---------- */
  .cat-grid{display:grid;grid-template-columns:repeat(5, 1fr);gap:10px;}
  .cat-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 4px;border-radius:var(--radius-md);border:1px solid var(--line);background:var(--surface);}
  .cat-item:hover{border-color:rgba(243,184,6,.35);background:var(--surface-2);}
  .cat-item .ic{font-size:22px;}
  .cat-item .lb{font-size:11.5px;font-weight:700;color:var(--rice-dim);}

  /* ---------- 가로 스크롤 카드 ---------- */
  .row-scroll{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 8px;}
  .card-wrap{position:relative;flex:none;width:200px;}
  .fav-btn{
    position:absolute;top:12px;left:12px;z-index:2;width:26px;height:26px;border-radius:50%;
    border:1px solid var(--line);background:rgba(38,45,38,0.85);color:var(--rice-dim);
    font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .fav-btn:hover{color:var(--danger);}
  .fav-btn.active{color:var(--danger);border-color:rgba(226,112,79,0.4);}
  .card{
    position:relative;height:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);
    padding:18px 16px 16px;display:flex;flex-direction:column;gap:9px;min-height:150px;cursor:pointer;
    transition:border-color .2s ease, background .2s ease;overflow:hidden;
  }
  .card:hover{border-color:rgba(243,184,6,.35);background:var(--surface-2);}
  .card.soon{filter:grayscale(.5);}
  .card.soon:hover{border-color:var(--line);background:var(--surface);}
  .ribbon{position:absolute;top:12px;right:-28px;background:var(--surface-2);color:var(--rice-dim);font-size:10px;font-weight:800;letter-spacing:.05em;padding:3px 30px;transform:rotate(28deg);border:1px solid var(--line);}
  .card-icon{font-size:24px;}
  .card-title{font-size:14.5px;font-weight:700;color:var(--rice);}
  .card.soon .card-title{color:var(--rice-dim);}
  .card-desc{font-size:12px;color:var(--rice-dim);flex:1;margin:0;}
  .card-foot{font-size:11.5px;font-weight:700;color:var(--yolk);}
  .card.soon .card-foot{color:var(--rice-dim);}

  /* ---------- 최신 업데이트 ---------- */
  .update-list{display:flex;flex-direction:column;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--line);}
  .update-item{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border-bottom:1px solid var(--line);}
  .update-item:last-child{border-bottom:none;}
  .update-item:hover{background:var(--surface-2);}
  .update-item .ic{font-size:18px;}
  .update-item .title{font-size:13.5px;font-weight:600;color:var(--rice);flex:1;}
  .update-item .cat{font-size:11.5px;color:var(--rice-dim);}
  .update-item .date{font-size:11.5px;color:var(--rice-dim);flex:none;}

  /* ---------- 하단 내비게이션 ---------- */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(29,35,30,0.95);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:none;}
  .bottom-nav .row{display:grid;grid-template-columns:repeat(4,1fr);}
  .bottom-nav button, .bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 12px;background:none;border:none;color:var(--rice-dim);font-size:10.5px;font-weight:700;cursor:pointer;}
  .bottom-nav .ic{font-size:18px;}
  @media (max-width:680px){ .bottom-nav{display:block;} }
  @media (max-width:640px){ .cat-grid{grid-template-columns:repeat(5,1fr);} .cat-item .lb{font-size:10px;} }
  @media (max-width:420px){ .hero h1{font-size:30px;} .brand span.label{display:none;} }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="index.html"><span class="dot"></span>everyday<span>-tab</span></a>
    <div class="search-box">
      <div class="search-input-row">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="무엇을 찾고 계신가요?" autocomplete="off">
      </div>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
  </div>
</div>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Daily Utility Box</div>
    <h1>everyday<span class="tab">-tab</span></h1>
    <p class="desc">레시피 한 장, 계산기 하나, 잠깐의 게임까지 — 검색 한 번으로 필요한 걸 찾고, 다른 유용한 도구도 발견해보세요.</p>
    <div class="popular-row">
      <span class="label">인기 검색어</span>
      <span class="dd-chip" data-q="BMI">BMI</span>
      <span class="dd-chip" data-q="김치찌개">김치찌개</span>
      <span class="dd-chip" data-q="2048">2048</span>
      <span class="dd-chip" data-q="생후일수">생후일수</span>
      <span class="dd-chip" data-q="D-Day">D-Day</span>
    </div>
  </section>

  <section class="block">
    <div class="block-head"><h2>🔥 인기 도구</h2><a class="more" href="category.html?sort=popular">전체 ›</a></div>
    <div class="row-scroll no-scrollbar" id="popularRow"></div>
  </section>

  <section class="block" id="categories">
    <div class="block-head"><h2>카테고리</h2></div>
    <div class="cat-grid" id="catGrid"></div>
  </section>

  <div id="categoryRows"></div>

  <section class="block">
    <div class="block-head"><h2>✨ 오늘의 추천</h2></div>
    <div class="row-scroll no-scrollbar" id="todayRow"></div>
  </section>

  <section class="block">
    <div class="block-head"><h2>🆕 최신 업데이트</h2></div>
    <div class="update-list" id="updateList"></div>
  </section>
</div>

<nav class="bottom-nav">
  <div class="row">
    <a href="index.html"><span class="ic">🏠</span>홈</a>
    <button id="navSearchBtn"><span class="ic">🔍</span>검색</button>
    <a href="#categories"><span class="ic">📂</span>카테고리</a>
    <a href="favorites.html"><span class="ic">♥</span>즐겨찾기</a>
  </div>
</nav>

<script src="data.js"></script>
<script src="favorites.js"></script>
<script src="cards.js"></script>
<script>
(function(){
  "use strict";

  /* ================= 카테고리 그리드 ================= */
  const catGrid = document.getElementById("catGrid");
  CATEGORIES.forEach(c => {
    const a = document.createElement("a");
    a.className = "cat-item";
    a.href = "category.html?cat=" + c.key;
    a.innerHTML = '<span class="ic">' + c.icon + '</span><span class="lb">' + c.label + '</span>';
    catGrid.appendChild(a);
  });

  /* ================= 인기순 정렬 (실시간 데이터 있으면 그걸로, 없으면 초기 시드값) ================= */
  function scoreOf(item, popularityData){
    if (popularityData && Object.keys(popularityData).length && window.__etPathToKey){
      var key = window.__etPathToKey(item.href || "");
      return popularityData[key] || 0;
    }
    return item.popularity;
  }

  /* ================= 인기 도구 ================= */
  const popularRow = document.getElementById("popularRow");
  function renderPopularRow(popularityData){
    popularRow.innerHTML = "";
    ITEMS.slice().sort((a, b) => scoreOf(b, popularityData) - scoreOf(a, popularityData)).slice(0, 10)
      .forEach(item => popularRow.appendChild(createCardElement(item)));
  }
  renderPopularRow(null);

  /* ================= 카테고리별 가로 스크롤 ================= */
  const categoryRowsEl = document.getElementById("categoryRows");
  function renderCategoryRows(popularityData){
    categoryRowsEl.innerHTML = "";
    CATEGORIES.forEach(c => {
      const items = ITEMS.filter(i => i.category === c.key)
        .sort((a, b) => scoreOf(b, popularityData) - scoreOf(a, popularityData)).slice(0, 8);
      if (!items.length) return;

      const section = document.createElement("section");
      section.className = "block";
      section.innerHTML =
        '<div class="block-head"><h2>' + c.icon + ' ' + c.label + '</h2>' +
        '<a class="more" href="category.html?cat=' + c.key + '">전체 ›</a></div>' +
        '<div class="row-scroll no-scrollbar"></div>';
      const row = section.querySelector(".row-scroll");
      items.forEach(item => row.appendChild(createCardElement(item)));
      categoryRowsEl.appendChild(section);
    });
  }
  renderCategoryRows(null);

  // 실시간 조회수 데이터가 도착하면(popularity.js가 로드된 뒤) 인기순을 다시 계산
  window.addEventListener("load", () => {
    if (!window.__etPopularityReady) return;
    window.__etPopularityReady.then(data => {
      if (!data || !Object.keys(data).length) return; // 아직 실데이터 없으면 시드값 유지
      renderPopularRow(data);
      renderCategoryRows(data);
    });
  });

  /* ================= 오늘의 추천 (날짜 시드 기반) ================= */
  function seededPick(arr, seed) {
    if (!arr.length) return null;
    let hash = 0;
    for (let i = 0; i < seed.length; i++) hash = (hash * 31 + seed.charCodeAt(i)) >>> 0;
    return arr[hash % arr.length];
  }
  const todaySeed = new Date().toISOString().slice(0, 10);
  const todayRow = document.getElementById("todayRow");
  [
    { label: "오늘의 레시피", cat: "recipe" },
    { label: "오늘의 게임", cat: "game" },
    { label: "오늘의 계산기", cat: "calculator" },
  ].forEach(p => {
    const pool = ITEMS.filter(i => i.category === p.cat);
    const readyPool = pool.filter(i => i.href);
    const item = seededPick(readyPool.length ? readyPool : pool, todaySeed + p.cat);
    if (!item) return;
    const col = document.createElement("div");
    col.innerHTML = '<p style="margin:0 0 8px;font-size:11.5px;font-weight:700;color:var(--rice-dim);">' + p.label + '</p>';
    col.appendChild(createCardElement(item));
    todayRow.appendChild(col);
  });

  /* ================= 최신 업데이트 ================= */
  const updateList = document.getElementById("updateList");
  ITEMS.slice().sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 6).forEach(item => {
    const c = CATEGORIES.find(x => x.key === item.category);
    const el = document.createElement(item.href ? "a" : "div");
    el.className = "update-item";
    if (item.href) el.href = item.href;
    el.innerHTML =
      '<span class="ic">' + item.icon + '</span>' +
      '<span class="title">' + item.title + '</span>' +
      '<span class="cat">' + (c ? c.label : "") + '</span>' +
      '<span class="date">' + item.date + '</span>';
    updateList.appendChild(el);
  });

  /* ================= 검색 자동완성 ================= */
  const searchInput = document.getElementById("searchInput");
  const dropdown = document.getElementById("searchDropdown");
  const RECENT_KEY = "et-recent-searches";
  const POPULAR_QUERIES = ["BMI", "김치찌개", "2048", "생후일수", "D-Day", "제육볶음"];

  function getRecent(){ try { return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]"); } catch(e){ return []; } }
  function pushRecent(q){
    const prev = getRecent().filter(x => x !== q);
    localStorage.setItem(RECENT_KEY, JSON.stringify([q, ...prev].slice(0, 6)));
  }

  function ddItemHtml(item){
    const c = CATEGORIES.find(x => x.key === item.category);
    return '<div class="dd-item" data-slug="' + item.slug + '">' +
      '<span class="dd-icon">' + item.icon + '</span>' +
      '<span class="dd-title">' + item.title + '</span>' +
      '<span class="dd-cat">' + (c ? c.label : "") + '</span></div>';
  }

  function goToItem(item){
    pushRecent(item.title);
    if (item.href) location.href = item.href;
    else location.href = "category.html?q=" + encodeURIComponent(item.title);
  }

  function renderDropdownIdle(){
    const recent = getRecent();
    let html = "";
    if (recent.length){
      html += '<div class="dd-section-title">최근 검색</div><div class="dd-chip-row">' +
        recent.map(q => '<span class="dd-chip" data-q="' + q + '">' + q + '</span>').join("") + '</div>';
    }
    html += '<div class="dd-section-title">인기 검색어</div><div class="dd-chip-row">' +
      POPULAR_QUERIES.map(q => '<span class="dd-chip" data-q="' + q + '">' + q + '</span>').join("") + '</div>';
    html += '<div class="dd-section-title">인기 도구</div>';
    html += ITEMS.slice().sort((a,b) => b.popularity - a.popularity).slice(0, 6).map(ddItemHtml).join("");
    dropdown.innerHTML = html;
  }

  function renderDropdownResults(q){
    const query = q.toLowerCase();
    const results = ITEMS.filter(i =>
      i.title.toLowerCase().includes(query) ||
      i.desc.toLowerCase().includes(query) ||
      i.tags.some(t => t.toLowerCase().includes(query))
    ).slice(0, 10);

    if (!results.length){
      dropdown.innerHTML = '<div class="dd-empty">검색 결과가 없어요. 다른 키워드로 시도해보세요.</div>';
      return;
    }
    dropdown.innerHTML = '<div class="dd-section-title">검색 결과</div>' + results.map(ddItemHtml).join("");
  }

  function bindDropdownClicks(){
    dropdown.querySelectorAll(".dd-item").forEach(el => {
      el.addEventListener("click", () => {
        const item = ITEMS.find(i => i.slug === el.dataset.slug);
        if (item) goToItem(item);
      });
    });
    dropdown.querySelectorAll(".dd-chip").forEach(el => {
      el.addEventListener("click", () => {
        searchInput.value = el.dataset.q;
        pushRecent(el.dataset.q);
        location.href = "category.html?q=" + encodeURIComponent(el.dataset.q);
      });
    });
  }

  function openDropdown(){
    const q = searchInput.value.trim();
    if (q) renderDropdownResults(q);
    else renderDropdownIdle();
    bindDropdownClicks();
    dropdown.classList.add("open");
  }

  searchInput.addEventListener("focus", openDropdown);
  searchInput.addEventListener("input", openDropdown);
  searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && searchInput.value.trim()){
      pushRecent(searchInput.value.trim());
      location.href = "category.html?q=" + encodeURIComponent(searchInput.value.trim());
    }
  });
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-box")) dropdown.classList.remove("open");
  });

  document.querySelectorAll(".popular-row .dd-chip").forEach(chip => {
    chip.addEventListener("click", () => { location.href = "category.html?q=" + encodeURIComponent(chip.dataset.q); });
  });

  /* ================= 하단 내비 - 검색 버튼 ================= */

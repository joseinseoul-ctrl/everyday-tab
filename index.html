<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="naver-site-verification" content="dbb5fd93bbf7ddbbb24501896cc227afe76a9064" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>everyday-tab · 매일 열어보는 나만의 생활 도구함</title>
<meta name="description" content="요리 레시피, 생활 계산기, 미니 게임까지 — 매일 쓰는 도구를 한 곳에 모은 유틸리티 허브, everyday-tab.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --bg:#1D231E;
    --surface:#262D26;
    --surface-2:#2F3730;
    --line:rgba(245,241,232,0.10);
    --yolk:#F3B806;
    --yolk-deep:#C98F00;
    --broth:#CE8548;
    --negi:#8CB06A;
    --rice:#F5F1E8;
    --rice-dim:#B9B6A9;
    --danger:#E2704F;
    --radius-lg:22px;
    --radius-md:14px;
    --radius-sm:9px;
    --shadow:0 14px 32px rgba(0,0,0,0.35);
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%),
      radial-gradient(circle at 88% 8%, rgba(140,176,106,0.08), transparent 40%),
      var(--bg);
    color:var(--rice);
    font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.55;
    padding-bottom:60px;
  }
  h1,h2,h3{
    font-family:"Noto Serif KR",serif;
    margin:0;
    letter-spacing:-0.01em;
  }
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;}
  ::selection{background:var(--yolk);color:#1D231E;}
  :focus-visible{outline:3px solid var(--yolk);outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  .wrap{max-width:1040px;margin:0 auto;padding:0 20px;}

  /* ---------- 상단 고정바 ---------- */
  .topbar{
    position:sticky;top:0;z-index:40;
    backdrop-filter:blur(14px);
    background:rgba(29,35,30,0.86);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:1040px;margin:0 auto;padding:14px 20px;
    display:flex;align-items:center;justify-content:space-between;gap:14px;
  }
  .brand{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;}
  .brand .dot{
    width:9px;height:9px;border-radius:50%;background:var(--yolk);
    box-shadow:0 0 0 4px rgba(243,184,6,0.18);
  }
  .brand span{color:var(--yolk);}
  .topbar-sub{font-size:12.5px;color:var(--rice-dim);display:none;}
  @media (min-width:560px){ .topbar-sub{display:block;} }

  /* ---------- 히어로 ---------- */
  .hero{padding:44px 0 30px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px;}
  .eyebrow{
    font-size:12.5px;font-weight:700;letter-spacing:0.14em;color:var(--negi);
    text-transform:uppercase;
  }
  .hero h1{font-size:clamp(38px,10vw,58px);font-weight:900;color:var(--rice);}
  .hero h1 .tab{color:var(--yolk);}
  .hero p.desc{max-width:46ch;color:var(--rice-dim);font-size:15.5px;margin:0;}

  .meta-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
  .meta-chip{
    background:var(--surface);border:1px solid var(--line);
    padding:7px 13px;border-radius:999px;font-size:13px;color:var(--rice-dim);
    display:flex;align-items:center;gap:6px;
  }
  .meta-chip b{color:var(--rice);font-weight:700;}

  /* ---------- 필터 탭 ---------- */
  .filter-section{position:sticky;top:57px;z-index:30;background:var(--bg);padding:14px 0;margin-top:4px;}
  .filter-tabs{
    display:flex;gap:8px;overflow-x:auto;padding:4px 2px;
    scrollbar-width:none;
  }
  .filter-tabs::-webkit-scrollbar{display:none;}
  .filter-btn{
    flex:none;border:1px solid var(--line);background:var(--surface);color:var(--rice-dim);
    font-size:14px;font-weight:700;padding:10px 18px;border-radius:999px;
    cursor:pointer;transition:background .18s ease, color .18s ease, transform .12s ease, border-color .18s ease;
    white-space:nowrap;
  }
  .filter-btn:active{transform:scale(0.95);}
  .filter-btn.active{background:var(--yolk);color:#241a00;border-color:var(--yolk);}

  /* ---------- 카드 그리드 ---------- */
  section.block{padding:14px 0 30px;}
  .card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
    gap:16px;
  }

  .card{
    position:relative;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-lg);
    padding:22px 20px 20px;
    display:flex;flex-direction:column;gap:12px;
    min-height:180px;
    cursor:pointer;
    transition:opacity .26s ease, transform .26s ease, border-color .2s ease, background .2s ease;
  }
  .card:hover{border-color:rgba(243,184,6,0.35);background:var(--surface-2);}
  .card:active{transform:scale(0.98);}
  .card-hidden{opacity:0;transform:scale(0.92);pointer-events:none;}

  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .card-icon{font-size:28px;line-height:1;}
  .card-badge{
    font-size:11px;font-weight:800;letter-spacing:0.02em;
    padding:5px 10px;border-radius:999px;
    background:rgba(140,176,106,0.14);color:var(--negi);
    white-space:nowrap;
  }
  .card-title{font-size:18px;font-weight:700;color:var(--rice);}
  .card-desc{font-size:13.5px;color:var(--rice-dim);flex:1;margin:0;}
  .card-foot{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;color:var(--yolk);margin-top:4px;}
  .card-foot .arrow{transition:transform .18s ease;}
  .card:hover .card-foot .arrow{transform:translateX(4px);}

  /* Coming Soon 카드 */
  .card.coming-soon{
    filter:grayscale(0.55);
    background:var(--surface);
  }
  .card.coming-soon:hover{border-color:var(--line);background:var(--surface);}
  .card.coming-soon .card-badge{background:rgba(245,241,232,0.08);color:var(--rice-dim);}
  .card.coming-soon .card-title{color:var(--rice-dim);}
  .card.coming-soon .card-foot{color:var(--rice-dim);}
  .card.coming-soon .card-foot .arrow{display:none;}
  .ribbon{
    position:absolute;top:14px;right:-30px;
    background:var(--surface-2);color:var(--rice-dim);
    font-size:10.5px;font-weight:800;letter-spacing:0.06em;
    padding:4px 34px;transform:rotate(28deg);
    border:1px solid var(--line);
  }

  footer{padding:34px 0 4px;text-align:center;color:var(--rice-dim);font-size:12.5px;border-top:1px solid var(--line);margin-top:20px;}
  footer .wrap{padding-top:22px;}

  @media (max-width:400px){
    .hero h1{font-size:34px;}
    .card{padding:18px 16px 16px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand"><span class="dot"></span>everyday<span>-tab</span></div>
    <div class="topbar-sub">매일 열어보는 나만의 생활 도구함</div>
  </div>
</div>

<div class="wrap">

  <section class="hero">
    <div class="eyebrow">Daily Utility Box</div>
    <h1>everyday<span class="tab">-tab</span></h1>
    <p class="desc">레시피 한 장, 계산기 하나, 잠깐의 게임까지 — 하루에 한 번은 열어보게 되는 생활 도구를 한 탭 안에 모았습니다.</p>

    <div class="meta-row">
      <div class="meta-chip">🛠 총 <b id="totalCount">0</b>개 도구</div>
      <div class="meta-chip">📂 <b>3</b>개 카테고리</div>
      <div class="meta-chip">🟢 <b>매주</b> 업데이트</div>
    </div>
  </section>

  <div class="filter-section">
    <nav class="filter-tabs" id="filterTabs" role="tablist" aria-label="카테고리 필터">
      <button class="filter-btn active" data-filter="all">전체보기</button>
      <button class="filter-btn" data-filter="recipe">🍳 요리 레시피</button>
      <button class="filter-btn" data-filter="calc">📊 생활 계산기</button>
      <button class="filter-btn" data-filter="game">🎮 미니 게임</button>
    </nav>
  </div>

  <section class="block">
    <div class="card-grid" id="cardGrid"></div>
  </section>

</div>

<footer>
  <div class="wrap">© 2026 everyday-tab. All rights reserved.</div>
</footer>

<script>
(function(){
  "use strict";

  /* ================= 콘텐츠 데이터 ================= */
  var items = [
    {
      category:"recipe",
      badge:"🍳 요리 레시피",
      icon:"🍚",
      title:"오야코동 실전 레시피",
      desc:"인원수 맞춤 계량과 단계별 타이머까지 갖춘 인터랙티브 레시피.",
      href:"recipe/oyakodon.html",
      ready:true
    },
    {
      category:"recipe",
      badge:"🍳 요리 레시피",
      icon:"🐄",
      title:"규동(소고기덮밥) 레시피",
      desc:"인원수 맞춤 계량과 단계별 타이머로 만드는 10분 완성 규동.",
      href:"recipe/gyudon.html",
      ready:true
    },
    {
      category:"recipe",
      badge:"🍳 요리 레시피",
      icon:"🍝",
      title:"알리오 올리오 레시피",
      desc:"마늘 향 내는 불 조절과 유화 타이밍까지 잡아주는 오일 파스타.",
      href:"recipe/aglio-olio.html",
      ready:true
    },
    {
      category:"recipe",
      badge:"🍳 요리 레시피",
      icon:"🥩",
      title:"부채살 스테이크 굽기",
      desc:"두께별 굽는 시간과 레스팅 타이머로 완성하는 코스트코 부채살 스테이크.",
      href:"recipe/steak.html",
      ready:true
    },
    {
      category:"recipe",
      badge:"🍳 요리 레시피",
      icon:"🍗",
      title:"닭근위(똥집) 마늘볶음",
      desc:"데친 근위를 마늘 향 가득한 팬에 바삭하게 볶아내는 술안주.",
      href:"recipe/geunwi-garlic.html",
      ready:true
    },
    {
      category:"recipe",
      badge:"🍳 요리 레시피",
      icon:"🍤",
      title:"감바스 알 아히요",
      desc:"마늘·페페론치노 오일에 새우를 익히는 스페인식 타파스.",
      href:"recipe/gambas.html",
      ready:true
    },
    {
      category:"recipe",
      badge:"🍳 요리 레시피",
      icon:"🥘",
      title:"돼지고기 김치찌개",
      desc:"신김치와 돼지고기를 볶아 끓여내는 한국인의 소울푸드.",
      href:"recipe/kimchi-jjigae.html",
      ready:true
    },
    {
      category:"recipe",
      badge:"🍳 요리 레시피",
      icon:"🌶",
      title:"순두부찌개",
      desc:"고추기름부터 내어 얼큰하고 뽀얗게 끓이는 순두부찌개.",
      href:"recipe/sundubu-jjigae.html",
      ready:true
    },
    {
      category:"recipe",
      badge:"🍳 요리 레시피",
      icon:"🔥",
      title:"백종원풍 제육볶음",
      desc:"양념에 재웠다가 센 불에 볶아 불맛을 살리는 매콤 제육볶음.",
      href:"recipe/jeyuk-bokkeum.html",
      ready:true
    },
    {
      category:"recipe",
      badge:"🍳 요리 레시피",
      icon:"🥫",
      title:"스팸 두부조림",
      desc:"노릇하게 지진 두부와 스팸을 자작하게 조리는 밥도둑 반찬.",
      href:"recipe/spam-dubu-jorim.html",
      ready:true
    },
    {
      category:"recipe",
      badge:"🍳 요리 레시피",
      icon:"🍳",
      title:"계란말이",
      desc:"층층이 말아내는 도시락·술상 필수 기본기 반찬.",
      href:"recipe/gyeranmari.html",
      ready:true
    },
    {
      category:"calc",
      badge:"📊 생활 계산기",
      icon:"💰",
      title:"퇴직금 계산기",
      desc:"근속기간과 평균임금만 입력하면 예상 퇴직금을 계산합니다.",
      ready:false
    },
    {
      category:"calc",
      badge:"📊 생활 계산기",
      icon:"🔤",
      title:"글자수 세기",
      desc:"자소서·SNS 글자수를 공백 포함/제외로 실시간 확인합니다.",
      ready:false
    },
    {
      category:"game",
      badge:"🎮 미니 게임",
      icon:"🧩",
      title:"MBTI 미니 게임",
      desc:"열두 개의 질문으로 가볍게 즐기는 성향 테스트.",
      ready:false
    },
    {
      category:"game",
      badge:"🎮 미니 게임",
      icon:"✊",
      title:"가위바위보 챌린지",
      desc:"연승 기록에 도전하는 초간단 미니 게임.",
      ready:false
    }
  ];

  /* ================= 카드 렌더링 ================= */
  var grid = document.getElementById("cardGrid");
  var totalCountEl = document.getElementById("totalCount");

  items.forEach(function(item){
    var isReady = !!item.ready;

    var card = document.createElement(isReady ? "a" : "div");
    card.className = "card" + (isReady ? "" : " coming-soon");
    card.dataset.category = item.category;

    if (isReady){
      card.href = item.href;
    } else {
      card.setAttribute("role", "button");
      card.setAttribute("tabindex", "0");
      var ribbon = document.createElement("div");
      ribbon.className = "ribbon";
      ribbon.textContent = "SOON";
      card.appendChild(ribbon);

      var openAlert = function(){ alert("준비 중인 기능입니다 🙏\n조금만 기다려주세요!"); };
      card.addEventListener("click", openAlert);
      card.addEventListener("keydown", function(e){
        if (e.key === "Enter" || e.key === " "){ e.preventDefault(); openAlert(); }
      });
    }

    var top = document.createElement("div");
    top.className = "card-top";

    var icon = document.createElement("div");
    icon.className = "card-icon";
    icon.textContent = item.icon;

    var badge = document.createElement("span");
    badge.className = "card-badge";
    badge.textContent = item.badge;

    top.appendChild(icon);
    top.appendChild(badge);

    var title = document.createElement("h3");
    title.className = "card-title";
    title.textContent = item.title;

    var desc = document.createElement("p");
    desc.className = "card-desc";
    desc.textContent = item.desc;

    var foot = document.createElement("div");
    foot.className = "card-foot";
    var footLabel = document.createElement("span");
    footLabel.textContent = isReady ? "바로가기" : "Coming Soon";
    var arrow = document.createElement("span");
    arrow.className = "arrow";
    arrow.textContent = "→";
    foot.appendChild(footLabel);
    if (isReady) foot.appendChild(arrow);

    card.appendChild(top);
    card.appendChild(title);
    card.appendChild(desc);
    card.appendChild(foot);

    grid.appendChild(card);
  });

  /* 총 도구 개수 카운트업 애니메이션 */
  (function countUp(){
    var target = items.length;
    var current = 0;
    var timer = setInterval(function(){
      current += 1;
      totalCountEl.textContent = current;
      if (current >= target) clearInterval(timer);
    }, 90);
  })();

  /* ================= 카테고리 필터링 ================= */
  var filterTabs = document.getElementById("filterTabs");
  var cards = Array.prototype.slice.call(grid.querySelectorAll(".card"));

  function applyFilter(category){
    cards.forEach(function(card){
      var match = category === "all" || card.dataset.category === category;

      if (match){
        if (card.style.display === "none"){
          card.style.display = "";
          // 강제 리플로우 후 다음 프레임에 보이도록 전환
          void card.offsetWidth;
          requestAnimationFrame(function(){
            requestAnimationFrame(function(){
              card.classList.remove("card-hidden");
            });
          });
        } else {
          card.classList.remove("card-hidden");
        }
      } else {
        card.classList.add("card-hidden");
        setTimeout(function(){
          if (card.classList.contains("card-hidden")) card.style.display = "none";
        }, 260);
      }
    });
  }

  filterTabs.addEventListener("click", function(e){
    var btn = e.target.closest(".filter-btn");
    if (!btn) return;

    filterTabs.querySelectorAll(".filter-btn").forEach(function(b){
      b.classList.toggle("active", b === btn);
    });
    applyFilter(btn.dataset.filter);
  });

})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>여행 예산 계산기 · 여행 도구</title>
<meta name="description" content="일정과 인원에 맞는 예상 여행 경비를 계산합니다.">
<link rel="canonical" href="https://www.everyday-tab.com/travel/travel-budget.html">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.everyday-tab.com/travel/travel-budget.html">
<meta property="og:site_name" content="Everyday Tab">
<meta property="og:title" content="여행 예산 계산기 | Everyday Tab">
<meta property="og:description" content="일정과 인원에 맞는 예상 여행 경비를 계산합니다.">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="여행 예산 계산기 | Everyday Tab">
<meta name="twitter:description" content="일정과 인원에 맞는 예상 여행 경비를 계산합니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9;
    --radius-lg:22px; --radius-md:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%), var(--bg);
    color:var(--rice);font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;line-height:1.55;padding-bottom:60px;}
  h1,h2{font-family:"Noto Serif KR",serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;}
  button,input{font-family:inherit;}
  ::selection{background:var(--yolk);color:#1D231E;}
  :focus-visible{outline:2px solid var(--yolk);outline-offset:2px;}
  .wrap{max-width:520px;margin:0 auto;padding:0 20px;}

  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(29,35,30,0.86);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:520px;margin:0 auto;padding:12px 20px;}
  .back-link{font-size:13px;font-weight:700;color:var(--rice-dim);}
  .back-link:hover{color:var(--yolk);}

  .hero{padding:30px 0 10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--negi);text-transform:uppercase;}
  .hero h1{font-size:clamp(26px,7vw,36px);font-weight:900;}
  .hero p{max-width:40ch;color:var(--rice-dim);font-size:14.5px;margin:0;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;margin-top:22px;display:flex;flex-direction:column;gap:16px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  label{display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:700;color:var(--rice-dim);}
  input[type="number"]{
    height:46px;border-radius:var(--radius-md);border:1px solid var(--line);background:var(--surface-2);
    color:var(--rice);padding:0 14px;font-size:15px;font-weight:700;outline:none;width:100%;
  }

  .result{padding:22px;border-radius:var(--radius-lg);border:1px solid var(--line);background:var(--surface-2);}
  .placeholder{color:var(--rice-dim);font-size:13.5px;text-align:center;display:block;padding:16px 0;}
  .breakdown{display:flex;flex-direction:column;gap:6px;}
  .b-row{display:flex;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);font-size:13.5px;}
  .b-row .lb{color:var(--rice-dim);}
  .b-row .v{font-weight:700;color:var(--rice);}
  .b-total{margin-top:4px;display:flex;justify-content:space-between;padding:14px;font-size:16px;font-weight:900;color:var(--yolk);}

  .note{margin-top:20px;background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius-lg);padding:16px 18px;font-size:13.5px;color:var(--rice-dim);}
  .note b{color:var(--rice);}

  .related{margin-top:26px;}
  .related h2{font-size:16px;font-weight:700;margin-bottom:10px;}
  .related-row{display:flex;gap:10px;}
  .related-card{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:13px;font-weight:700;text-align:center;}
  .related-card:hover{border-color:rgba(243,184,6,.35);}
  .related-card .ic{font-size:20px;display:block;margin-bottom:4px;}

  footer{padding:30px 0 4px;text-align:center;color:var(--rice-dim);font-size:12.5px;}
</style>
</head>
<body>

<div class="topbar"><div class="topbar-inner"><a class="back-link" href="../index.html">← everyday-tab</a></div></div>

<div class="wrap">
  <section class="hero">
    <div class="eyebrow">Travel Budget Calculator</div>
    <h1>💳 여행 예산 계산기</h1>
    <p>일정과 인원, 예상 항목별 비용을 입력하면 총 여행 경비를 계산해드려요.</p>
  </section>

  <div class="card">
    <div class="field-row">
      <label>여행 일수
        <input type="number" id="daysInput" inputmode="numeric" placeholder="4">
      </label>
      <label>인원 수
        <input type="number" id="peopleInput" inputmode="numeric" placeholder="2">
      </label>
    </div>
    <div class="field-row">
      <label>1인 항공료 (원)
        <input type="number" id="flightInput" inputmode="numeric" placeholder="450000">
      </label>
      <label>1박 숙박비 (전체, 원)
        <input type="number" id="hotelInput" inputmode="numeric" placeholder="120000">
      </label>
    </div>
    <div class="field-row">
      <label>1인 1일 식비 (원)
        <input type="number" id="foodInput" inputmode="numeric" placeholder="40000">
      </label>
      <label>1인 1일 기타/액티비티 (원)
        <input type="number" id="etcInput" inputmode="numeric" placeholder="20000">
      </label>
    </div>

    <div class="result" id="resultBox">
      <span class="placeholder">항목을 입력해주세요</span>
    </div>
  </div>

  <div class="note">
    <b>Tip.</b> 숙박비는 "1박 전체 금액"(방 1개 기준)을 입력해주세요. 인원이 방을 나눠 쓴다면 필요한 방 개수만큼 곱해서 입력하시면 더 정확해요.
  </div>

  <div class="related">
    <h2>🔗 이런 것도 찾아보세요</h2>
    <div class="related-row">
      <a class="related-card" href="time-difference.html"><span class="ic">🕐</span>시차 계산기</a>
      <a class="related-card" href="../finance/exchange-rate.html"><span class="ic">💱</span>환율 계산기</a>
    </div>
  </div>

  <footer>everyday-tab · 여행 도구</footer>
</div>

<script>
(function(){
  "use strict";

  const daysInput = document.getElementById("daysInput");
  const peopleInput = document.getElementById("peopleInput");
  const flightInput = document.getElementById("flightInput");
  const hotelInput = document.getElementById("hotelInput");
  const foodInput = document.getElementById("foodInput");
  const etcInput = document.getElementById("etcInput");
  const resultBox = document.getElementById("resultBox");

  function formatWon(n){
    return Math.round(n).toLocaleString("ko-KR") + "원";
  }

  function render(){
    const days = parseInt(daysInput.value, 10);
    const people = parseInt(peopleInput.value, 10);
    const flight = parseFloat(flightInput.value) || 0;
    const hotel = parseFloat(hotelInput.value) || 0;
    const food = parseFloat(foodInput.value) || 0;
    const etc = parseFloat(etcInput.value) || 0;

    if (!(days > 0) || !(people > 0)){
      resultBox.innerHTML = '<span class="placeholder">여행 일수와 인원 수를 입력해주세요</span>';
      return;
    }

    const nights = Math.max(days - 1, 0);
    const flightTotal = flight * people;
    const hotelTotal = hotel * nights;
    const foodTotal = food * people * days;
    const etcTotal = etc * people * days;
    const grandTotal = flightTotal + hotelTotal + foodTotal + etcTotal;

    resultBox.innerHTML =
      '<div class="breakdown">' +
        '<div class="b-row"><span class="lb">항공료 (' + people + '인)</span><span class="v">' + formatWon(flightTotal) + '</span></div>' +
        '<div class="b-row"><span class="lb">숙박비 (' + nights + '박)</span><span class="v">' + formatWon(hotelTotal) + '</span></div>' +
        '<div class="b-row"><span class="lb">식비 (' + people + '인 × ' + days + '일)</span><span class="v">' + formatWon(foodTotal) + '</span></div>' +
        '<div class="b-row"><span class="lb">기타/액티비티</span><span class="v">' + formatWon(etcTotal) + '</span></div>' +
        '<div class="b-total"><span>총 예상 경비</span><span>' + formatWon(grandTotal) + '</span></div>' +
      '</div>';
  }

  [daysInput, peopleInput, flightInput, hotelInput, foodInput, etcInput].forEach(el => el.addEventListener("input", render));
})();
</script>
<script src="../share.js" defer></script>
</body>
</html>

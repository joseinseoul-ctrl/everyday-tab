<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>everyday-tab</title>
<meta name="robots" content="noindex, follow">
<meta name="description" content="everyday-tab의 카테고리별, 태그별 도구 모음입니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
  :root{
    --bg:#1D231E; --surface:#262D26; --surface-2:#2F3730; --line:rgba(245,241,232,0.10);
    --yolk:#F3B806; --yolk-deep:#C98F00; --negi:#8CB06A; --rice:#F5F1E8; --rice-dim:#B9B6A9; --danger:#E2704F;
    --radius-lg:22px; --radius-md:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 12% -10%, rgba(243,184,6,0.10), transparent 45%), var(--bg);
    color:var(--rice);font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;line-height:1.55;padding-bottom:60px;}
  h1,h2{font-family:"Noto Serif KR",serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;text-decoration:none;}
  button,select{font-family:inherit;}
  ::selection{background:var(--yolk);color:#1D231E;}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px;}

  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(29,35,30,0.86);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:1040px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px;}
  .back-link{font-size:13px;font-weight:700;color:var(--rice-dim);white-space:nowrap;}
  .back-link:hover{color:var(--yolk);}

  .head{padding:28px 0 10px;display:flex;align-items:center;gap:12px;}
  .head-icon{font-size:32px;}
  .head h1{font-size:26px;font-weight:800;color:var(--rice);}
  .head p{margin:4px 0 0;font-size:13.5px;color:var(--rice-dim);}

  .toolbar{display:flex;flex-wrap:wrap;gap:8px;padding:14px 0;}
  select{
    height:38px;border-radius:999px;border:1px solid var(--line);background:var(--surface);
    color:var(--rice);padding:0 14px;font-size:13.5px;font-weight:700;outline:none;cursor:pointer;
  }
  select:focus-visible{outline:2px solid var(--yolk);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:14px;padding:10px 0 30px;}
  .card-wrap{position:relative;}
  .fav-btn{
    position:absolute;top:14px;left:14px;z-index:2;width:28px;height:28px;border-radius:50%;
    border:1px solid var(--line);background:rgba(38,45,38,0.85);color:var(--rice-dim);
    font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:color .15s ease, border-color .15s ease;
  }
  .fav-btn:hover{color:var(--danger);}
  .fav-btn.active{color:var(--danger);border-color:rgba(226,112,79,0.4);}
  .card{
    position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);
    padding:20px 18px 18px;display:flex;flex-direction:column;gap:10px;min-height:168px;cursor:pointer;
    transition:opacity .2s ease, transform .2s ease, border-color .2s ease, background .2s ease;
  }
  .card:hover{border-color:rgba(243,184,6,0.35);background:var(--surface-2);}
  .card.soon{filter:grayscale(.5);}
  .card.soon:hover{border-color:var(--line);background:var(--surface);}
  .ribbon{position:absolute;top:14px;right:-30px;background:var(--surface-2);color:var(--rice-dim);
    font-size:10.5px;font-weight:800;letter-spacing:.06em;padding:4px 34px;transform:rotate(28deg);border:1px solid var(--line);}
  .card-icon{font-size:26px;}
  .card-title{font-size:16px;font-weight:700;color:var(--rice);}
  .card.soon .card-title{color:var(--rice-dim);}
  .card-desc{font-size:13px;color:var(--rice-dim);flex:1;margin:0;}
  .card-foot{font-size:12.5px;font-weight:700;color:var(--yolk);}
  .card.soon .card-foot{color:var(--rice-dim);}
  .tag-row{display:flex;flex-wrap:wrap;gap:5px;}
  .tag-chip{font-size:11px;color:var(--rice-dim);background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:2px 8px;}

  .empty{padding:60px 0;text-align:center;color:var(--rice-dim);font-size:14px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="back-link" href="index.html">← everyday-tab</a>
  </div>
</div>

<div class="wrap">
  <div class="head" id="head"></div>
  <div class="toolbar">
    <select id="sortSelect">
      <option value="popular">인기순</option>
      <option value="recent">최신순</option>
      <option value="az">가나다순</option>
    </select>
    <select id="tagSelect">
      <option value="">태그: 전체</option>
    </select>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">해당하는 도구가 아직 없어요.</div>
</div>

<script src="data.js"></script>
<script src="favorites.js"></script>
<script src="cards.js"></script>
<script>
(function(){
  "use strict";

  const params = new URLSearchParams(location.search);
  let cat = params.get("cat") || "";
  let tag = params.get("tag") || "";
  const q = (params.get("q") || "").trim().toLowerCase();
  let sort = params.get("sort") || "popular";

  const headEl = document.getElementById("head");
  const gridEl = document.getElementById("grid");
  const emptyEl = document.getElementById("empty");
  const sortSelect = document.getElementById("sortSelect");
  const tagSelect = document.getElementById("tagSelect");
  sortSelect.value = sort;

  function scopeItems(){
    let items = ITEMS.slice();
    if (cat) items = items.filter(i => i.category === cat);
    if (q) {
      items = items.filter(i =>
        i.title.toLowerCase().includes(q) ||
        i.desc.toLowerCase().includes(q) ||
        i.tags.some(t => t.toLowerCase().includes(q))
      );
    }
    return items;
  }

  function renderHead(){
    if (cat) {
      const c = CATEGORIES.find(x => x.key === cat);
      document.title = (c ? c.label : cat) + " | everyday-tab";
      headEl.innerHTML =
        '<span class="head-icon">' + (c ? c.icon : "📁") + '</span>' +
        '<div><h1>' + (c ? c.label : cat) + '</h1><p>' + (c ? '이 카테고리의 모든 도구' : '') + '</p></div>';
    } else if (tag) {
      document.title = "#" + tag + " | everyday-tab";
      headEl.innerHTML = '<div><h1>#' + tag + '</h1><p>이 태그와 연결된 모든 도구</p></div>';
    } else if (q) {
      document.title = '"' + q + '" 검색 결과 | everyday-tab';
      headEl.innerHTML = '<div><h1>"' + q + '" 검색 결과</h1><p></p></div>';
    } else {
      document.title = "전체 도구 | everyday-tab";
      headEl.innerHTML = '<div><h1>전체 도구</h1><p></p></div>';
    }
  }

  function renderTagOptions(items){
    const tags = Array.from(new Set(items.flatMap(i => i.tags))).sort();
    tagSelect.innerHTML = '<option value="">태그: 전체</option>' +
      tags.map(t => '<option value="' + t + '"' + (t === tag ? ' selected' : '') + '>#' + t + '</option>').join("");
  }

  function sortItems(items){
    const arr = items.slice();
    if (sort === "recent") arr.sort((a, b) => new Date(b.date) - new Date(a.date));
    else if (sort === "az") arr.sort((a, b) => a.title.localeCompare(b.title, "ko"));
    else arr.sort((a, b) => b.popularity - a.popularity);
    return arr;
  }

  function render(){
    renderHead();

    let items = scopeItems();
    renderTagOptions(items);

    if (tag) items = items.filter(i => i.tags.includes(tag));
    items = sortItems(items);

    gridEl.innerHTML = "";
    emptyEl.style.display = items.length ? "none" : "block";

    items.forEach(item => {
      gridEl.appendChild(createCardElement(item));
    });
  }

  function syncUrl(){
    const p = new URLSearchParams();
    if (cat) p.set("cat", cat);
    if (tag) p.set("tag", tag);
    if (q) p.set("q", q);
    if (sort !== "popular") p.set("sort", sort);
    history.replaceState(null, "", location.pathname + (p.toString() ? "?" + p.toString() : ""));
  }

  sortSelect.addEventListener("change", () => { sort = sortSelect.value; syncUrl(); render(); });
  tagSelect.addEventListener("change", () => { tag = tagSelect.value; syncUrl(); render(); });

  render();
})();
</script>
</body>
</html>
